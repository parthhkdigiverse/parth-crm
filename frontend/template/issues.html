<!DOCTYPE html>
<!-- frontend/template/issues.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/frontend/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Issues — SRM AI SETU</title>

    <link rel="stylesheet" href="/frontend/css/bootstrap.min.css">
    <link rel="stylesheet" href="/frontend/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/frontend/css/theme.css?v=20260406">
    <link rel="stylesheet" href="/frontend/css/components.css?v=20260406">
    <style>
        /* Inline Validation */
        .is-invalid {
            border-color: #dc2626 !important;
        }
        .is-invalid:focus {
            box-shadow: 0 0 0 3px rgba(220, 38, 38, 0.15) !important;
        }
        .invalid-feedback {
            display: block;
            color: #dc2626;
            font-size: 0.72rem;
            font-weight: 600;
            margin-top: 4px;
        }
    </style>
</head>

<body class="bg-light">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1 main-wrapper">
            <!-- The top header is automatically injected here by js/auth.js?v=20260321 -->
            <div class="page-content-standard">
                <div class="page-header-glass mb-4 d-flex flex-column flex-md-row justify-content-between align-items-start align-items-md-center">
                    <div>
                        <h2 class="page-section-title">Issues</h2>
                        <small class="text-muted" id="issue-count"></small>
                    </div>
                    <button class="btn btn-primary" id="report-issue-btn" onclick="openReportModal()">
                        <i class="bi bi-plus-lg me-1"></i>Report Issue
                    </button>
                </div>
                <!-- Filter Panel Wrapper -->
                <div id="filter-wrapper" class="mb-4"></div>
                <div class="card shadow-sm">
                    <div class="card-body p-0">
                        <!-- Table Section Header -->
                        <div class="table-section-header">
                            <div class="table-section-title">
                                <i class="bi bi-bug"></i>
                                Issue Logs
                            </div>
                            <!-- Status Filter Dropdown -->
                            <div class="dropdown">
                                <button class="btn btn-sm dropdown-toggle d-flex align-items-center gap-2 px-3" 
                                    type="button" id="statusViewDropdown" data-bs-toggle="dropdown" aria-expanded="false"
                                    style="background: var(--bg-app); border: 1.5px solid var(--border); border-radius: 10px; font-weight: 700; color: var(--text-main); height: 32px; font-size: 0.75rem;">
                                    <i class="bi bi-grid-fill text-secondary"></i>
                                    <span id="current-status-label">All Issues</span>
                                </button>
                                <ul class="dropdown-menu dropdown-menu-end shadow-sm border-0" aria-labelledby="statusViewDropdown" style="font-size: 0.85rem; border-radius: 12px; padding: 8px; min-width: 180px;">
                                    <li><a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2 active" href="javascript:void(0)" onclick="switchStatusTab('ALL', 'All Issues', 'bi-grid-fill')">
                                        <i class="bi bi-grid-fill text-secondary"></i> All Issues
                                    </a></li>
                                    <li><hr class="dropdown-divider"></li>
                                    <li><a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2" href="javascript:void(0)" onclick="switchStatusTab('OPEN', 'Open Issues', 'bi-exclamation-circle-fill')">
                                        <i class="bi bi-exclamation-circle-fill text-primary"></i> Open Issues
                                    </a></li>
                                    <li><a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2" href="javascript:void(0)" onclick="switchStatusTab('IN_PROGRESS', 'In Progress', 'bi-command')">
                                        <i class="bi bi-command text-info"></i> In Progress
                                    </a></li>
                                    <li><a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2" href="javascript:void(0)" onclick="switchStatusTab('RESOLVED', 'Resolved Issues', 'bi-check-circle-fill')">
                                        <i class="bi bi-check-circle-fill text-success"></i> Resolved
                                    </a></li>
                                    <li><a class="dropdown-item d-flex align-items-center gap-2 py-2 rounded-2" href="javascript:void(0)" onclick="switchStatusTab('CANCELLED', 'Cancelled Issues', 'bi-x-circle-fill')">
                                        <i class="bi bi-x-circle-fill text-muted"></i> Cancelled
                                    </a></li>
                                </ul>
                            </div>
                        </div>
                        <div class="table-responsive mx-2 mb-2">
                            <table class="table align-middle mb-0">
                                <thead>
                                    <tr>
                                        <th class="ps-3" style="width: 40px;">
                                            <input type="checkbox" class="form-check-input" id="issue-select-all"
                                                onclick="toggleAllIssues(this)">
                                        </th>
                                        <th class="text-secondary fw-semibold">ISSUE</th>
                                        <th class="text-secondary fw-semibold">SEVERITY</th>
                                        <th class="text-secondary fw-semibold">STATUS</th>
                                        <th class="text-secondary fw-semibold">CLIENT & PM</th>
                                        <th class="text-secondary fw-semibold">REPORTED BY</th>
                                        <th class="text-secondary fw-semibold">DATE</th>
                                        <th class="text-secondary fw-semibold text-end">ACTION</th>
                                    </tr>
                                </thead>
                                <tbody id="issues-table">
                                    <tr>
                                        <td colspan="8" class="text-center py-5 text-muted">
                                            <i class="bi bi-arrow-clockwise" style="font-size:2rem;"></i>
                                            <p class="mt-2">Loading...</p>
                                        </td>
                                    </tr>
                                </tbody>
                            </table>
                        </div>
                        <div id="issues-pagination"></div>
                    </div>
                </div>
            </div><!-- /page-content -->
        </div>
    </div>

    <!-- Add Issue Modal -->
    <div class="modal fade" id="addIssueModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered modal-lg">
            <div class="modal-content border-0 shadow-lg">
                <div class="modal-header border-bottom-0 pb-0">
                    <h5 class="modal-title fw-bold text-main"><i class="bi bi-bug-fill text-danger me-2"></i>Report Issue</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div class="row g-3">
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Project <span class="text-danger">*</span></label>
                            <select id="i-project" class="form-select" required onchange="autoFillClientFromProject()">
                                <option value="">Loading Projects...</option>
                            </select>
                        </div>
                        <div class="col-md-6">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Client <span class="text-danger">*</span></label>
                            <div id="i-client-display" class="form-control bg-light text-muted" style="min-height: 38px; display: flex; align-items: center;">-- Auto-filled from Project --</div>
                            <input type="hidden" id="i-client">
                        </div>
                        <div class="col-md-8">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Title <span class="text-danger">*</span></label>
                            <input id="i-title" class="form-control" placeholder="Brief summary of the issue" required>
                        </div>
                        <div class="col-md-4">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Severity</label>
                            <select id="i-sev" class="form-select">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Description</label>
                            <textarea id="i-desc" class="form-control" rows="2" placeholder="Details about the issue..."></textarea>
                        </div>
                        <div class="col-12">
                            <label class="form-label fw-semibold" style="font-size: 0.85rem;">Assign to (Optional)</label>
                            <select id="i-handler" class="form-select bg-light">
                                <option value="">-- Default (PM) --</option>
                            </select>
                            <small class="text-muted d-block mt-1" style="font-size:0.75rem;"><i class="bi bi-info-circle me-1"></i>If unassigned, it defaults to the project's assigned PM.</small>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-top-0 pt-0">
                    <button class="btn btn-light px-4" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-danger px-4 fw-bold" id="save-issue-btn">Report Issue</button>
                </div>
            </div>
        </div>
    </div>

    <!-- Handle Issue Modal -->
    <div class="modal fade" id="handleIssueModal" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title fw-bold">Handle Issue</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <input type="hidden" id="h-issue-id">
                    <div class="mb-3"><label class="form-label">Update Status</label>
                        <select id="h-status" class="form-select">
                            <option value="OPEN">Open</option>
                            <option value="IN_PROGRESS">In Progress</option>
                            <option value="RESOLVED">Resolved</option>
                            <option value="BLOCKED">Blocked</option>
                            <option value="CANCELLED">Cancelled</option>
                        </select>
                    </div>
                    <div class="mb-3"><label class="form-label">Remarks / Notes <span
                                class="text-danger">*</span></label>
                        <textarea id="h-remarks" class="form-control" rows="3"
                            placeholder="Explain the status change..." required></textarea>
                    </div>
                </div>
                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary" id="save-handle-btn">Update Issue</button>
                </div>
            </div>
        </div>
    </div>

    <script src="/frontend/js/utils.js?v=20260411"></script>
    <script src="/frontend/js/api.js?v=20260411"></script>
    <script src="/frontend/js/auth.js?v=20260411"></script>
    <script src="/frontend/js/ui_components.js?v=20260411"></script>
    <script src="/frontend/js/app.js?v=20260411"></script>
    <script src="/frontend/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        const sb = document.getElementById('sidebar');
        if (sb) sb.innerHTML = renderSidebar('issues');
        injectTopHeader('Issues');

        // Custom soft styling logic
        const sevStyle = {
            HIGH: 'badge-red-light',
            MEDIUM: 'badge-yellow-light',
            LOW: 'badge-blue-light'
        };
        const stStyle = {
            OPEN:        'badge-yellow-light',
            IN_PROGRESS: 'badge-blue-light',
            RESOLVED:    'badge-green-light',
            BLOCKED:     'badge-red-light',
            CANCELLED:   'badge-slate-light'
        };

        let currentTabStatus = 'ALL';

        window.switchStatusTab = function(status, label, iconClass) {
            currentTabStatus = status;
            
            // Update UI Dropdown Label & Icon
            if (label && iconClass) {
                const labelEl = document.getElementById('current-status-label');
                const btnEl = document.getElementById('statusViewDropdown');
                if (labelEl) labelEl.textContent = label;
                if (btnEl) {
                    const icon = btnEl.querySelector('i');
                    if (icon) {
                        icon.className = `bi ${iconClass}`;
                        if (status === 'OPEN') icon.style.color = 'var(--primary)';
                        else if (status === 'RESOLVED') icon.style.color = 'var(--success-text)';
                        else icon.style.color = 'var(--text-muted)';
                    }
                }
            }

            // Update active state in dropdown items
            const menu = document.querySelector('#statusViewDropdown + .dropdown-menu');
            if (menu) {
                menu.querySelectorAll('.dropdown-item').forEach(el => {
                    const clickAttr = el.getAttribute('onclick') || '';
                    el.classList.toggle('active', clickAttr.includes(`'${status}'`));
                });
            }

            // Update filter dropdown if it exists (for sync with renderFilterPanel)
            const statusDropdown = document.getElementById('filter-status');
            if (statusDropdown) {
                statusDropdown.value = status;
            }

            // Load data
            loadIssues({ status: status });
        };

        const sevIcons = {
            HIGH: `<i class="bi bi-exclamation-triangle text-danger me-2"></i>`,
            MEDIUM: `<i class="bi bi-exclamation-triangle text-warning me-2"></i>`,
            LOW: `<i class="bi bi-exclamation-triangle text-secondary me-2"></i>`
        };

        const currentUser = ApiClient.getCurrentUser() || {};
        const isAdminUser = String(currentUser.role || '').toUpperCase() === 'ADMIN';
        const canCreateIssue = window.hasFeatureAccess ? window.hasFeatureAccess('issue_create_roles') : true;

        const reportIssueBtn = document.getElementById('report-issue-btn');
        if (reportIssueBtn && !canCreateIssue) {
            reportIssueBtn.style.display = 'none';
        }

        async function loadIssues(filters = {}) {
            const tableBody = document.getElementById('issues-table');
            tableBody.innerHTML = `
                <tr class="stagger-fade-in">
                    <td colspan="7" class="py-4">
                        <div class="d-flex align-items-center gap-3 mb-3">
                            <div class="skeleton-box skeleton-circle" style="width: 24px; height: 24px;"></div>
                            <div class="flex-grow-1"><div class="skeleton-box skeleton-text medium mb-1"></div></div>
                            <div class="flex-grow-1"><div class="skeleton-box skeleton-text short mb-1"></div></div>
                        </div>
                        <div class="d-flex align-items-center gap-3">
                            <div class="skeleton-box skeleton-circle" style="width: 24px; height: 24px;"></div>
                            <div class="flex-grow-1"><div class="skeleton-box skeleton-text medium mb-1"></div></div>
                            <div class="flex-grow-1"><div class="skeleton-box skeleton-text short mb-1"></div></div>
                        </div>
                    </td>
                </tr>`;

            const params = new URLSearchParams();
            params.append('limit', filters.limit || '200');
            if (filters.skip) params.append('skip', filters.skip);
            
            if (filters.severity && filters.severity !== 'ALL') params.append('severity', filters.severity);
            if (filters.status && filters.status !== 'ALL') params.append('status', filters.status);
            if (filters.client && filters.client !== 'ALL') params.append('client_id', filters.client);
            if (filters.pm && filters.pm !== 'ALL') params.append('pm_id', filters.pm);

            const issues = await apiGet(`/issues/?${params.toString()}`);
            const open = issues.filter(i => i.status === 'OPEN').length;
            document.getElementById('issue-count').textContent = `${open} unresolved · ${issues.length} total issues`;
            if (window.checkHighPriorityIssues) window.checkHighPriorityIssues();

            renderPagination({
                data: issues,
                tbodyId: 'issues-table',
                paginationId: 'issues-pagination',
                emptyMsg: '<tr><td colspan="8" class="text-center py-5 text-muted">No issues found.</td></tr>',
                renderRow: (i) => {
                    const icon = sevIcons[i.severity] || sevIcons['LOW'];
                    const sBadge = `<span class="badge rounded-pill fw-medium px-3 py-2 ${sevStyle[i.severity] || sevStyle.LOW}">${i.severity}</span>`;
                    const stLabel = (i.status || 'PENDING').replace('_', ' ').toLowerCase().replace(/\b\w/g, l => l.toUpperCase());
                    const stBadge = `<span class="badge rounded-pill fw-medium px-3 py-2 ${stStyle[i.status] || stStyle.PENDING}">${stLabel}</span>`;
                    const isCritical = i.severity === 'HIGH' && !['RESOLVED', 'CANCELLED'].includes(i.status);
                    const criticalClass = isCritical ? 'critical-issue-row' : '';
                    const canUpdateIssue = isAdminUser || (currentUser.id && (i.assigned_to_id === currentUser.id || i.reporter_id === currentUser.id));
                    const canDeleteIssue = isAdminUser;
                    return `
                <tr class="align-middle ${criticalClass}" style="height: 60px; cursor: ${canUpdateIssue ? 'pointer' : 'default'};" ${canUpdateIssue ? `onclick="openHandleModal('${i.id}', '${i.status}', '${(i.remarks || '').replace(/'/g, "\\'")}')"` : ''}>
                    <td class="ps-3" onclick="event.stopPropagation()">
                        <input type="checkbox" class="form-check-input issue-checkbox" value="${i.id}" onclick="updateSelectedCount()">
                    </td>
                    <td class="fw-semibold text-dark">
                        ${icon} ${i.title}
                        ${i.remarks ? `<div class="text-muted small ms-4" style="font-size:0.75rem;"><i class="bi bi-chat-left-text me-1"></i>${i.remarks}</div>` : ''}
                    </td>
                    <td>${sBadge}</td>
                    <td>${stBadge}</td>
                    <td class="text-muted">
                        <div class="fw-medium text-dark">${i.project_name || i.client_name || 'N/A'}</div>
                        <div class="small">${i.pm_name && i.pm_name !== 'Unassigned' ? `<i class="bi bi-person-fill me-1 text-primary"></i><span class="text-dark">${i.pm_name}</span>` : '<span class="text-muted fst-italic">Unassigned</span>'}</div>
                    </td>
                    <td class="text-muted">${i.reporter_name || 'System'}</td>
                    <td class="text-muted">${i.created_at ? new Date(i.created_at).toLocaleDateString('en-GB', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A'}</td>
                    <td class="text-end" onclick="event.stopPropagation()">
                        <div class="d-flex gap-2 justify-content-end">
                            ${canUpdateIssue ? `<button class="btn btn-sm btn-outline-primary" onclick="openHandleModal('${i.id}', '${i.status}', '${(i.remarks || '').replace(/'/g, "\\'")}')" title="Handle"><i class="bi bi-wrench-adjustable"></i></button>` : ''}
                            ${canUpdateIssue && i.status !== 'RESOLVED' && i.status !== 'CANCELLED' ? `<button class="btn btn-sm btn-outline-success" onclick="quickResolve('${i.id}')" title="Quick Resolve"><i class="bi bi-check-lg"></i></button>` : ''}
                            ${canDeleteIssue ? `<button class="btn btn-sm btn-outline-danger" onclick="deleteIssue('${i.id}')" title="Delete"><i class="bi bi-trash"></i></button>` : ''}
                        </div>
                    </td>
                </tr>`;
                }
            });
        }

        window.openHandleModal = (id, currentStatus, currentRemarks) => {
            const modalEl = document.getElementById('handleIssueModal');
            document.getElementById('h-issue-id').value = id;
            document.getElementById('h-status').value = currentStatus;
            document.getElementById('h-remarks').value = currentRemarks;
            
            // Clear validation state
            modalEl.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            modalEl.querySelectorAll('.invalid-feedback').forEach(el => el.remove());

            bootstrap.Modal.getOrCreateInstance(modalEl).show();
        };

        document.getElementById('save-handle-btn').addEventListener('click', async () => {
            const id = document.getElementById('h-issue-id').value;
            const hStatus = document.getElementById('h-status').value;
            const hRemarks = document.getElementById('h-remarks').value.trim();

            const rules = {
                'h-remarks': 'Remarks are required for status updates'
            };

            if (!window.validateForm(document.getElementById('handleIssueModal'), rules)) {
                return;
            }

            const btn = document.getElementById('save-handle-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            try {
                await apiPatch(`/clients/issues/${id}`, {
                    status: hStatus,
                    remarks: hRemarks
                });
                bootstrap.Modal.getInstance(document.getElementById('handleIssueModal')).hide();
                showToast('Issue updated successfully!');
                loadIssues();
            } catch (e) { showToast(e.message || 'Failed to update issue', 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Update Issue'; }
        });

        window.quickResolve = async (id) => {
            const remarks = prompt("Please provide mandatory remarks for resolving this issue:");
            if (remarks === null) return; // User cancelled prompt
            if (!remarks.trim()) return showToast('Remarks are compulsory to resolve', 'error');

            try {
                await apiPatch(`/clients/issues/${id}`, { status: 'RESOLVED', remarks: remarks.trim() });
                showToast('Issue marked as Resolved', 'success');
                loadIssues();
            } catch (e) { showToast(e.message || 'Failed to resolve issue', 'error'); }
        };

        window.deleteIssue = async (id) => {
            if (!confirm('Are you sure you want to delete this issue?')) return;
            try {
                await ApiClient.request(`/clients/issues/${id}`, { method: 'DELETE' });
                showToast('Issue deleted!', 'success');
                loadIssues();
            } catch (e) { showToast(e.message || 'Failed to delete issue', 'error'); }
        };

        // --- Load all projects into the Project dropdown (primary selector) ---
        let _allProjects = []; // cache for client auto-fill
        let _allClients = []; // cache for client name lookup

        window.openReportModal = () => {
            const modalEl = document.getElementById('addIssueModal');
            // Clear validation state
            modalEl.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
            modalEl.querySelectorAll('.invalid-feedback').forEach(el => el.remove());

            // If a client was pre-provided, ensure dropdown is filtered
            const clientVal = document.getElementById('i-client').value;
            if (clientVal) {
                const projSelect = document.getElementById('i-project');
                const options = Array.from(projSelect.options);
                let foundMatch = false;
                options.forEach(opt => {
                    const cid = opt.getAttribute('data-client-id');
                    if (!opt.value) return; // Skip select project placeholder
                    if (cid && String(cid) === String(clientVal)) {
                        opt.style.display = '';
                        foundMatch = true;
                    } else {
                        opt.style.display = 'none';
                    }
                });
            }

            bootstrap.Modal.getOrCreateInstance(modalEl).show();
        };

        async function loadModalData() {
            const projSelect = document.getElementById('i-project');
            const handlerSelect = document.getElementById('i-handler');
            
            projSelect.innerHTML = '<option value="">-- Select Project --</option>';
            
            try {
                const [projects, clients, usersRes] = await Promise.all([
                    apiGet('/projects/'),
                    apiGet('/clients/'),
                    apiGet('/users/')
                ]);
                
                _allProjects = projects || [];
                _allClients = clients || [];
                const users = Array.isArray(usersRes) ? usersRes : (usersRes.data || usersRes.items || []);

                // Populate Projects
                projSelect.innerHTML = '<option value="">-- Select Project --</option>' +
                    _allProjects.map(p => `<option value="${p.id}" data-client-id="${p.client_id}">${p.name}</option>`).join('');

                // Populate Handlers
                const activeStaff = users.filter(u => u.is_active);
                handlerSelect.innerHTML = `
                    <option value="">-- Default (Project PM) --</option>
                    <optgroup label="Team Assignments (Broadcast)">
                        <option value="GROUP_ALL">Assign All (Company Wide)</option>
                        <option value="GROUP_SALES">Assign All SALES Team</option>
                        <option value="GROUP_PM">Assign All PMs</option>
                        <option value="GROUP_PM_SALES">Assign All PMs & SALES Team</option>
                    </optgroup>
                    <optgroup label="Individual Assignments">
                        ${activeStaff.map(u => `<option value="${u.id}">${u.name || u.email} (${(u.role || '').replace('_', ' ')})</option>`).join('')}
                    </optgroup>
                `;

                // Handle URL param: if client_id passed, pre-select
                const urlParams = new URLSearchParams(window.location.search);
                const urlClient = urlParams.get('client_id');
                if (urlClient) {
                    const client = _allClients.find(c => String(c.id) === String(urlClient));
                    if (client) {
                        document.getElementById('i-client-display').innerHTML = `<i class="bi bi-person-check-fill text-success me-2"></i>${client.name}`;
                        document.getElementById('i-client-display').className = 'form-control bg-light text-success fw-semibold';
                        document.getElementById('i-client').value = client.id;

                        // Try to find a matching project
                        const matches = _allProjects.filter(p => String(p.client_id) === String(urlClient));
                        if (matches.length > 0) {
                            projSelect.value = matches[0].id;
                            // Trigger autofill to ensure internal state is synced
                            if (window.autoFillClientFromProject) window.autoFillClientFromProject();
                        }
                    }
                    openReportModal();
                }
            } catch (err) {
                console.error('Failed to load modal data', err);
                projSelect.innerHTML = '<option value="">Error loading data.</option>';
                showToast('Failed to load project/client data', 'error');
            }
        }

        /* loadModalData called at bottom - fix for auto-open */

        /* Handlers populated in loadModalData */

        // Auto-fill client from selected project
        window.autoFillClientFromProject = () => {
            const projSelect = document.getElementById('i-project');
            const selectedOption = projSelect.options[projSelect.selectedIndex];
            const clientDisplay = document.getElementById('i-client-display');
            const clientInput = document.getElementById('i-client');

            if (!projSelect.value) {
                clientDisplay.textContent = '-- Auto-filled from Project --';
                clientDisplay.className = 'form-control bg-light text-muted';
                clientInput.value = '';
                return;
            }

            const clientId = selectedOption.getAttribute('data-client-id');
            const client = _allClients.find(c => String(c.id) === String(clientId));

            if (client) {
                clientDisplay.innerHTML = `<i class="bi bi-person-check-fill text-success me-2"></i>${client.name}`;
                clientDisplay.className = 'form-control bg-light text-success fw-semibold';
                clientInput.value = client.id;
            } else {
                // Project has no linked active client
                clientDisplay.innerHTML = `<i class="bi bi-exclamation-triangle text-warning me-2"></i>No linked client`;
                clientDisplay.className = 'form-control bg-light text-warning fw-semibold';
                clientInput.value = '';
            }
        };

        document.getElementById('save-issue-btn').addEventListener('click', async () => {
            if (!canCreateIssue) {
                showToast('You do not have permission to report issues', 'error');
                return;
            }
            const modalEl = document.getElementById('addIssueModal');
            const rules = {
                'i-client': 'Select a client',
                'i-title': 'Issue title is required'
            };

            if (window.validateForm && !window.validateForm(modalEl, rules)) {
                return;
            }

            const projectId = document.getElementById('i-project').value;
            if (!projectId) return showToast('Please select a project', 'error');
            const clientId = document.getElementById('i-client').value;
            if (!clientId) return showToast('The selected project has no linked client. Cannot report issue.', 'error');
            const title = document.getElementById('i-title').value.trim();
            if (!title) return showToast('Issue title is required', 'error');

            const handlerVal = document.getElementById('i-handler').value;
            let assignedId = null;
            let assignedGroup = null;

            if (handlerVal.startsWith('GROUP_')) {
                assignedGroup = handlerVal;
            } else if (handlerVal) {
                assignedId = handlerVal;
            }

            const btn = document.getElementById('save-issue-btn');
            btn.disabled = true; btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Saving...';
            try {
                await ApiClient.createIssue(clientId, {
                    title: document.getElementById('i-title').value.trim(),
                    description: document.getElementById('i-desc').value,
                    severity: document.getElementById('i-sev').value,
                    project_id: projectId,
                    assigned_to_id: assignedId,
                    assigned_group: assignedGroup,
                    status: 'OPEN'
                });
                bootstrap.Modal.getInstance(document.getElementById('addIssueModal')).hide();
                showToast('Issue reported successfully!');
                loadIssues();
            } catch (e) { showToast(e.message, 'error'); }
            finally { btn.disabled = false; btn.textContent = 'Report Issue'; }
        });

        function toggleAllIssues(master) {
            document.querySelectorAll('.issue-checkbox').forEach(cb => cb.checked = master.checked);
            updateSelectedCount();
        }

        function updateSelectedCount() {
            const selected = document.querySelectorAll('.issue-checkbox:checked').length;
            window.updateBulkActionBar({
                count: selected,
                onDelete: () => batchDeleteIssues(),
                onCancel: () => {
                    document.querySelectorAll('.issue-checkbox').forEach(cb => cb.checked = false);
                    document.getElementById('issue-select-all').checked = false;
                    updateSelectedCount();
                }
            });
        }

        // Modal reset on close
        const addIssueModalEl = document.getElementById('addIssueModal');
        if (addIssueModalEl) {
            addIssueModalEl.addEventListener('hidden.bs.modal', () => {
                document.getElementById('i-project').value = '';
                document.getElementById('i-client').value = '';
                document.getElementById('i-title').value = '';
                document.getElementById('i-desc').value = '';
                document.getElementById('i-handler').value = '';
                document.getElementById('i-sev').value = 'MEDIUM';
                document.getElementById('i-client-display').textContent = '-- Auto-filled from Project --';
                document.getElementById('i-client-display').className = 'form-control bg-light text-muted';
                
                // Clear validation state
                addIssueModalEl.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                addIssueModalEl.querySelectorAll('.invalid-feedback').forEach(el => el.remove());
            });
        }

        // Initialize Filters
        async function initFilters() {
            try {
                const [clients, usersRes] = await Promise.all([
                    apiGet('/clients/'),
                    apiGet('/users/')
                ]);
                const users = Array.isArray(usersRes) ? usersRes : (usersRes.items || []);
                const pms = users.filter(u => u.role === 'PROJECT_MANAGER' || u.role === 'PROJECT_MANAGER_AND_SALES' || u.role === 'ADMIN');

                renderFilterPanel({
                    containerId: 'filter-wrapper',
                    filters: [
                        { type: 'select', label: 'Severity', id: 'filter-sev', options: [
                            { value: 'ALL', label: 'All Severities' },
                            { value: 'HIGH', label: 'High' },
                            { value: 'MEDIUM', label: 'Medium' },
                            { value: 'LOW', label: 'Low' }
                        ]},
                        { type: 'select', label: 'Status', id: 'filter-status', options: [
                            { value: 'ALL', label: 'All Status' },
                            { value: 'OPEN', label: 'Open' },
                            { value: 'IN_PROGRESS', label: 'In Progress' },
                            { value: 'BLOCKED', label: 'Blocked' },
                            { value: 'RESOLVED', label: 'Resolved' },
                            { value: 'CANCELLED', label: 'Cancelled' }
                        ]},
                        { type: 'select', label: 'Client', id: 'filter-client', options: [{ value: 'ALL', label: 'All Clients' }, ...clients.map(c => ({ value: c.id, label: c.name }))] },
                        { type: 'select', label: 'PM', id: 'filter-pm', options: [{ value: 'ALL', label: 'All PMs' }, ...pms.map(u => ({ value: u.id, label: u.name || u.email }))] }
                    ],
                    onApply: (data) => loadIssues({
                        severity: data['sev'],
                        status: data['status'],
                        client: data['client'],
                        pm: data['pm']
                    }),
                    onReset: () => loadIssues()
                });
            } catch (err) {
                console.error("Filter Init Failed", err);
            }
        }

        loadIssues().then(() => {
            initFilters();
            const urlParams = new URLSearchParams(window.location.search);
            const highlightId = urlParams.get('id');
            if (highlightId) {
                setTimeout(() => {
                    const row = document.querySelector(`tr:has(button[onclick*="openHandleModal(${highlightId},"])`);
                    if (row) {
                        row.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        row.classList.add('highlight-row');
                    }
                }, 500);
            }

            const urlClient = urlParams.get('client_id');
            if (urlClient && !canCreateIssue) {
                showToast('You do not have permission to report issues', 'error');
            }
        });
        
        loadModalData();
    </script>
</body>

</html>
