                    let cellsHtml = '';
                    for (let c = 0; c < 7; c++) {
                        const ds = dStr(cur);
                        const isToday = ds === todayStr;
                        const isCurMonth = cur.getMonth() === mStart.getMonth();

                        const dayEvts = filteredEvents.filter(e => e.date === ds);
                        const evHtml = dayEvts.slice(0, 4).map(ev => {
                            const u = getEventStyles(ev);
                            const s = (ev.status || '').toUpperCase();
                            const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                            const icon = ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : '';
                            return `<div class="month-evt ${isDone ? 'evt-done' : ''}" style="background:${u.bg}; border-left:2px solid ${u.color}; color:${u.color};" onclick="event.stopPropagation();openEditModal('${ev._uid}')">${fmtH(ev.sh, ev.sm).replace(' AM', 'a').replace(' PM', 'p')} ${icon}${ev.title}</div>`;
                        }).join('');
                        const extra = dayEvts.length > 4 ? `<div class="month-evt-more">+${dayEvts.length - 4} more</div>` : '';

                        cellsHtml += `
                        <div class="month-cell ${!isCurMonth ? 'off-month' : ''} ${isToday ? 'today-cell' : ''}" onclick="selectDay('${ds}')">
                            <div class="month-cell-num ${isToday ? 'today-num' : ''}">${cur.getDate()}</div>
                            <div class="month-cell-evts">${evHtml}${extra}</div>
                        </div>`;
                        cur = addDays(cur, 1);
                    }
                    rowsHtml += `<div class="month-row">${cellsHtml}</div>`;
                    if (cur.getMonth() !== mStart.getMonth() && cur > mStart) {
                        break;
                    }
                }

                document.getElementById('main-content').innerHTML = `
                <!-- Toolbar -->
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-2">
                        <button class="toggle-sb-btn ${isSidebarMinimized ? 'active' : ''}" onclick="toggleCalSidebar()" title="Toggle Sidebar">
                            <i class="bi bi-layout-sidebar-inset"></i>
                        </button>
                        <button class="nav-btn" onclick="navMonth(-1)" title="Previous month"><i class="bi bi-chevron-left"></i></button>
                        <button class="nav-btn" onclick="navMonth(1)"  title="Next month"><i class="bi bi-chevron-right"></i></button>
                        <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                        <span class="nav-title">${navTitle}</span>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="view-pill">
                            <button onclick="setView('day')">Day</button>
                            <button onclick="setView('week')">Week</button>
                            <button class="active">Month</button>
                        </div>
                        <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()"><i class="bi bi-ui-checks"></i></button>
                    </div>
                </div>
                <div class="cal-wrapper">
                    <div class="cal-sidebar ${isSidebarMinimized ? 'minimized' : ''}">
                        ${buildSidebar().replace('<div class="cal-sidebar">', '').replace('</div>', '')}
                    </div>
                    <div class="cal-root ${isSidebarMinimized ? 'expanded' : ''}">
                        <!-- header -->
                        <div class="cal-day-header-row month-header" style="height:auto;">
                            <div class="cal-gutter-head" style="width:16px;"></div>
                            ${dayHeaders}
                        </div>
                        <div class="cal-scroll month-scroll">
                            <div class="month-grid" style="padding-left:16px;">
                                ${rowsHtml}
                            </div>
                        </div>
                    </div>
                </div>`;
                return;
            }

            // ── WEEK VIEW (continued below) ───────────────────────


            // Week date range label
            const wEnd = addDays(weekStart, 6);
            const mo1 = weekStart.toLocaleDateString('en-IN', { month: 'long' });
            const mo2 = wEnd.toLocaleDateString('en-IN', { month: 'long' });
            const yr = wEnd.getFullYear();
            const navTitle = (mo1 === mo2)
                ? `${mo1} ${yr}`
                : `${mo1} – ${mo2} ${yr}`;

            // Day header cells — clicking a date number opens day view
            const dayHeaders = Array.from({ length: 7 }, (_, i) => {
                const d = addDays(weekStart, i);
                const ds = dStr(d);
                const isToday = ds === todayStr;
                const numHtml = isToday
                    ? `<div class="today-dot" onclick="selectDay('${ds}')" style="cursor:pointer;">${d.getDate()}</div>`
                    : `<div class="dd" onclick="selectDay('${ds}')" style="cursor:pointer;font-size:1.35rem;font-weight:700;color:#334155;transition:color .15s;" onmouseover="this.style.color='#2563eb'" onmouseout="this.style.color='#334155'">${d.getDate()}</div>`;
                return `<div class="cal-dh${isToday ? ' today' : ''}"><div class="dn">${DAY_NAMES[i]}</div>${numHtml}</div>`;
            }).join('');

            // Hour labels
            const hourLabels = Array.from({ length: END_HR - START_HR }, (_, i) => {
                const h = START_HR + i;
                const lbl = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : `${h - 12} PM`;
                return `<div class="cal-hour-lbl">${lbl}</div>`;
            }).join('');

            // Now line position
            const nowH = today.getHours();
            const nowM = today.getMinutes();
            const nowTop = topPx(nowH, nowM);
            const showNow = nowH >= START_HR && nowH < END_HR;

            // Day columns and Pinned columns
            const TOTAL_H = (END_HR - START_HR) * HOUR_H;

            const pinnedColsHtml = Array.from({ length: 7 }, (_, i) => {
                const d = addDays(weekStart, i);
                const ds = dStr(d);
                const dayPinned = filteredEvents.filter(e => e.date === ds && (e.priority || '').toUpperCase() === 'HIGH');

                return `
                <div class="cal-dh" style="height: auto; min-height: 42px; border-bottom: none; background: #fff;">
                    <div class="tt-pinned-row-week">
                        ${dayPinned.map(ev => {
                    const u = getEventStyles(ev);
                    const timeStr = ev.event_type === 'MEETING' ? `[${String(ev.sh).padStart(2, '0')}:${String(ev.sm).padStart(2, '0')}] ` : '';
                    return `<div class="tt-pinned-capsule" style="background:${u.bg}; border-left:3px solid ${u.color}; color:${u.color};" onclick="openEditModal('${ev._uid}')" title="${ev.title}">
                                ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video-fill"></i>' : ''} <span class="text-truncate" style="flex:1; text-align:left;">${timeStr}${ev.title}</span>
                            </div>`;
                }).join('') || '<div style="text-align:center;"><span style="opacity:0.2; font-size:0.6rem;">—</span></div>'}
                    </div>
                </div>`;
            }).join('');

            const colsHtml = Array.from({ length: 7 }, (_, i) => {
                const d = addDays(weekStart, i);
                const ds = dStr(d);
                const isToday = ds === todayStr;

                // Hour lines with click-to-create capability
                let lines = '';
                for (let r = 0; r < (END_HR - START_HR); r++) {
                    const h = START_HR + r;
                    const hStr = h.toString().padStart(2, '0');
                    lines += `<div class="cal-hline"      style="top:${r * HOUR_H}px; height:${HOUR_H / 2}px; pointer-events:auto; cursor:pointer;" onclick="openCreateModal('${ds}', '${hStr}:00', '${hStr}:30')"></div>`;
                    lines += `<div class="cal-hline-half" style="top:${r * HOUR_H + HOUR_H / 2}px; height:${HOUR_H / 2}px; pointer-events:auto; cursor:pointer;" onclick="openCreateModal('${ds}', '${hStr}:30', '${(h + 1).toString().padStart(2, '0')}:00')"></div>`;
                }

                // Events for this day — filter out HIGH priority for main scroll
                const dayEvts = filteredEvents.filter(e => e.date === ds && (e.priority || '').toUpperCase() !== 'HIGH');
                const placed = packEvents(dayEvts);

                const evHtml = placed.map(({ ev, slot, slots }) => {
                    const u = getEventStyles(ev);
                    const t = Math.max(topPx(ev.sh, ev.sm), 0);
                    const h = Math.max(hPx(ev.sh, ev.sm, ev.eh, ev.em), 22);
                    const w = 96 / slots;
                    const l = 2 + slot * w;
                    const r = 2 + (slots - slot - 1) * w;
                    const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                    const s = (ev.status || '').toUpperCase();
                    const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                    return `
            <div class="cal-evt${isDone ? ' evt-done' : ''}" title="${ev.title} (${ev.user})\n${timeLbl}\n${ev.loc}"
                style="top:${t}px;height:${h}px;left:${l}%;width:${w}%;background:${u.bg};border-left:3px solid ${u.color};padding-left:${ev.event_type === 'TODO' ? '17px' : '8px'};min-width:40px;display:flex;flex-direction:column;"
                onclick="event.stopPropagation();openEditModal('${ev._uid}')">
                ${ev.event_type === 'TODO' ? `<button class="evt-complete-btn${isDone ? ' done' : ''}" style="color:${u.color};"
                    onclick="event.stopPropagation();completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></button>` : ''}
                <div class="evt-inner-title" style="color:${u.color};font-size:.7rem;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                    ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}
                </div>
                ${h > 30 ? `<div class="evt-time" style="font-size:0.6rem;white-space:nowrap;overflow:hidden;">${timeLbl}</div>` : ''}
                <div class="evt-user" style="color:${u.color};">${u.initials}</div>
            </div>`;
                }).join('');

                const nowHtml = (isToday && showNow && nowTop >= 0 && nowTop <= TOTAL_H) ? `
            <div class="now-dot" style="top:${nowTop}px;"></div>
            <div class="now-line" style="top:${nowTop}px;"></div>` : '';

                return `
        <div class="cal-col${isToday ? ' today-col' : ''}" style="height:${TOTAL_H}px; position:relative;">
            ${lines}${evHtml}${nowHtml}
        </div>`;
            }).join('');

            // Build the full calendar HTML
            document.getElementById('main-content').innerHTML = `
        <!-- Toolbar -->
        <div class="cal-toolbar">
            <div class="d-flex align-items-center gap-2">
                <button class="toggle-sb-btn ${isSidebarMinimized ? 'active' : ''}" onclick="toggleCalSidebar()" title="Toggle Sidebar">
                    <i class="bi bi-layout-sidebar-inset"></i>
                </button>
                <button class="nav-btn" title="Previous week" onclick="navWeek(-1)"><i class="bi bi-chevron-left"></i></button>
                <button class="nav-btn" title="Next week"     onclick="navWeek(1)"><i class="bi bi-chevron-right"></i></button>
                <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                <span class="nav-title text-truncate">${navTitle}</span>
            </div>
            <div class="d-flex align-items-center gap-3 flex-wrap">
                <!-- View toggle -->
                <div class="view-pill">
                    <button class="${currentView === 'day' ? 'active' : ''}"   onclick="setView('day')">Day</button>
                    <button class="${currentView === 'week' ? 'active' : ''}"  onclick="setView('week')">Week</button>
                    <button class="${currentView === 'month' ? 'active' : ''}" onclick="setView('month')">Month</button>
                </div>
                <!-- Switch to Tasks icon button -->
                <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()">
                    <i class="bi bi-ui-checks"></i>
                    <span class="tt-tip">Switch to Tasks</span>
                </button>
            </div>
        </div>

        <div class="cal-wrapper">
            <div class="cal-sidebar ${isSidebarMinimized ? 'minimized' : ''}">
                ${buildSidebar().replace('<div class="cal-sidebar">', '').replace('</div>', '')}
            </div>
            <!-- Calendar -->
            <div class="cal-root ${isSidebarMinimized ? 'expanded' : ''}">
                <!-- Day header row -->
                <div class="cal-day-header-row" style="grid-template-columns: 60px repeat(7, 1fr);">
                    <div class="cal-gutter-head"></div>
                    ${dayHeaders}
                </div>
                <!-- Pinned Row -->
                <div class="cal-day-header-row" style="grid-template-columns: 60px repeat(7, 1fr); border-bottom: 1px solid var(--border-subtle); background: #f8fafc;">
                    <div class="cal-gutter-head" style="background: #f8fafc; border-right: 1px solid #e2e8f0; display: flex; align-items: center; justify-content: center;">
                        <i class="bi bi-pin-angle-fill text-danger" style="font-size: 0.8rem;"></i>
                    </div>
                    ${pinnedColsHtml}
                </div>
                <!-- Scrollable body -->
                <div class="cal-scroll" id="calScrollBody">
                    <div class="cal-body-inner">
                        <div class="cal-gutter">${hourLabels}</div>
                        <div class="cal-cols">${colsHtml}</div>
                    </div>
                </div>
            </div>
        </div>`;

            // Scroll to 8 AM on initial load
            const sb = document.getElementById('calScrollBody');
            if (sb) {
                // Scroll to current time if today is visible, else scroll to 8 AM
                const targetScroll = showNow ? Math.max(nowTop - 100, 0) : HOUR_H;
                sb.scrollTop = targetScroll;
            }
        }

        // ── Navigation ──────────────────────────────────────────
        function navWeek(dir) {
            miniMonthOffset = 0;
            if (currentView === 'day') {
                selectedDate = addDays(selectedDate, dir);
            } else {
                weekStart = addDays(weekStart, dir * 7);
            }
            renderCalendar();
        }
        function navMonth(dir) {
            miniMonthOffset = 0;
            const refDate = currentView === 'month' ? selectedDate : weekStart;
            selectedDate = new Date(refDate.getFullYear(), refDate.getMonth() + dir, 1);
            weekStart = getWeekStart(selectedDate);
            renderCalendar();
        }
        function navMini(dir) {
            miniMonthOffset += dir;
            renderCalendarLocal();
        }
        function goToday() {
            miniMonthOffset = 0;
            selectedDate = new Date();
            weekStart = getWeekStart(new Date());
            renderCalendar();
        }
        function setView(v) {
            miniMonthOffset = 0;
            currentView = v;
            if (v === 'month') {
                selectedDate = new Date(weekStart.getFullYear(), weekStart.getMonth(), 1);
            }
            renderCalendar();
        }

        // ── Select a day (click on day number) → switch to day view ──
        function selectDay(ds) {
            if (showTaskView) { showTaskView = false; }
            const parts = ds.split('-');
            selectedDate = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, parseInt(parts[2], 10));
            currentView = 'day';
            renderCalendar();
        }

        // ── Tasks view toggle ───────────────────────────────────
        function toggleTaskView() {
            showTaskView = !showTaskView;
            renderCalendar();
        }
        function setTaskFilter(f) {
            taskFilter = f;
            renderCalendar();
        }

        // ── Actions ─────────────────────────────────────────────
        function openCreateModal(dateStr, startStr, endStr, preferredType = 'EVENT') {
            // Clear validation
            document.querySelectorAll('#scheduleModal .is-invalid').forEach(el => el.classList.remove('is-invalid'));

            document.getElementById('ev-date').value = dateStr;
            document.getElementById('ev-start').value = startStr;
            document.getElementById('ev-end').value = endStr;
            document.getElementById('ev-title').value = '';
            document.getElementById('ev-loc').value = '';

            // Clear task fields too
            ['td-related', 'td-desc'].forEach(id => {
                const el = document.getElementById(id); if (el) el.value = '';
            });

            if (preferredType === 'TASK') {
                document.getElementById('typeTask').checked = true;
            } else {
                document.getElementById('typeEvent').checked = true;
            }
            toggleModalType();

            // Reconfigure modal for Create
            const saveBtn = document.getElementById('btn-save-event');
            saveBtn.onclick = saveActivity;
            saveBtn.innerHTML = preferredType === 'TASK' ? '<i class="bi bi-plus-lg me-1"></i>Create Task' : '<i class="bi bi-check-lg me-1"></i>Schedule';

            // Default Assignee logic: "All Employees" for Admins on Tasks by default
            const userSel = document.getElementById('ev-user');
            if (isTimetableAdmin()) {
                if (preferredType === 'TASK') {
                    userSel.value = 'All Employees';
                } else {
                    userSel.value = ''; // Unassigned
                }
            } else {
                configureTimetableAssigneeSelect();
            }

            const delBtn = document.getElementById('btn-delete-event');
            if (delBtn) delBtn.style.display = 'none';

            bsModal.show();
        }

        function openEditModal(eventUid) {
            // Clear validation
            document.querySelectorAll('#scheduleModal .is-invalid').forEach(el => el.classList.remove('is-invalid'));

            const ev = events.find(e => e._uid === eventUid);
            if (!ev) return;

            if (ev.event_type === 'VISIT' || ev.event_type === 'MEETING') {
                showToastMsg(`Cannot edit synced ${ev.event_type.toLowerCase()}s from the calendar.`);
                return;
            }

            const isTask = ev.event_type === 'TODO';

            // Populate Shared Fields
            document.getElementById('ev-title').value = ev.title.replace(/^Todo: /, '');
            document.getElementById('ev-date').value = ev.date;
            document.getElementById('ev-start').value = `${String(ev.sh).padStart(2, '0')}:${String(ev.sm).padStart(2, '0')}`;
            document.getElementById('ev-end').value = `${String(ev.eh).padStart(2, '0')}:${String(ev.em).padStart(2, '0')}`;

            // Populate Type Specific
            if (isTask) {
                document.getElementById('td-priority').value = ev.priority || 'MEDIUM';
                document.getElementById('td-related').value = ev.loc || '';
                document.getElementById('td-desc').value = ev.description || '';
                document.getElementById('typeTask').checked = true;
            } else {
                document.getElementById('ev-loc').value = ev.loc || '';
                document.getElementById('typeEvent').checked = true;
            }

            // Try to set user if available in dropdown
            const userSelect = document.getElementById('ev-user');
            Array.from(userSelect.options).forEach(opt => {
                if (opt.value === ev.user) userSelect.value = ev.user;
            });

            document.getElementById('modal-title-text').innerText = isTask ? 'Edit Task' : 'Edit Event';
            toggleModalType();

            // Reconfigure modal for Update
            const saveBtn = document.getElementById('btn-save-event');
            saveBtn.onclick = () => updateActivity(ev.id, ev.event_type);
            saveBtn.innerHTML = '<i class="bi bi-floppy me-1"></i>Update';

            // Show delete button
            let delBtn = document.getElementById('btn-delete-event');
            if (delBtn) {
                delBtn.style.display = 'block';
                delBtn.onclick = () => deleteActivity(ev.id, ev.event_type);
            }

            bsModal.show();
        }

        async function updateActivity(id, type) {
            const isEvent = document.getElementById('typeEvent').checked;
            const title = document.getElementById('ev-title').value.trim();
            const user = isTimetableAdmin() ? document.getElementById('ev-user').value : getCurrentUserLabel();
            const date = document.getElementById('ev-date').value;
            const start = document.getElementById('ev-start').value;
            const end = document.getElementById('ev-end').value;

            const rules = {
                'ev-title': 'Title is required'
            };
            if (isEvent) {
                rules['ev-date'] = 'Date is required';
                rules['ev-start'] = 'Start time required';
                rules['ev-end'] = 'End time required';
            }

            if (!window.validateForm(document.getElementById('scheduleModal'), rules)) {
                return;
            }

            if (type === 'TODO') {
                const payload = {
                    title: title,
                    description: document.getElementById('td-desc').value.trim() || null,
                    priority: document.getElementById('td-priority').value,
                    assigned_to: user,
                    due_date: new Date(date).toISOString(),
                    start_time: start ? start + ":00" : null,
                    end_time: end ? end + ":00" : null,
                    related_entity: document.getElementById('td-related').value.trim() || null,
                    client_id: document.getElementById('ev-client').value || null
                };
                try {
                    await ApiClient.updateTodo(id, payload);
                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg('Task updated!');
                } catch (e) { alert("Update failed"); }
            } else {
                if (!start || !end) { alert("Times required"); return; }
                const eventData = {
                    title: title, assignee_name: user, date: date,
                    start_time: start, end_time: end,
                    location: document.getElementById('ev-loc').value.trim() || '',
                    priority: document.getElementById('td-priority').value
                };
                try {
                    await ApiClient.updateTimetableEvent(id, eventData);
                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg('Event updated!');
                } catch (e) { alert("Update failed"); }
            }
        }

        async function deleteActivity(id, type) {
            if (!confirm("Are you sure?")) return;
            try {
                if (type === 'TODO') await ApiClient.deleteTodo(id);
                else await ApiClient.deleteTimetableEvent(id);
                bsModal.hide();
                await renderCalendar();
                showToastMsg('Deleted!');
            } catch (e) { alert("Delete failed"); }
        }

        // ── Save event from modal ────────────────────────────────
        // ── Modal UI Toggles ─────────────────────────────────────
        function toggleModalType() {
            const isEvent = document.getElementById('typeEvent').checked;
            document.querySelectorAll('.event-fields').forEach(el => el.style.display = isEvent ? 'block' : 'none');
            document.querySelectorAll('.task-fields').forEach(el => el.style.display = isEvent ? 'none' : 'block');

            const isUpdate = document.getElementById('btn-save-event').innerHTML.includes('Update');

            if (isUpdate) {
                document.getElementById('modal-title-text').innerText = isEvent ? 'Edit Event' : 'Edit Task';
                document.getElementById('btn-save-event').innerHTML = '<i class="bi bi-floppy me-1"></i>Update';
            } else {
                document.getElementById('modal-title-text').innerText = isEvent ? 'Schedule Event' : 'Create Task';
                document.getElementById('btn-save-event').innerHTML = isEvent ? '<i class="bi bi-check-lg me-1"></i>Schedule' : '<i class="bi bi-plus-lg me-1"></i>Create Task';
            }

            if (isEvent) {
                document.getElementById('ev-date-label').innerHTML = '<i class="bi bi-calendar-event me-2"></i>Event Date <span class="text-danger">*</span>';
                document.getElementById('ev-start-label').innerHTML = 'Start Time <span class="text-danger">*</span>';
                document.getElementById('ev-end-label').innerHTML = 'End Time <span class="text-danger">*</span>';
            }
        }

        // ── Save logic (Unified Event/Task) ──────────────────────
        async function saveActivity() {
            const isEvent = document.getElementById('typeEvent').checked;

            if (isEvent) {
                // Event Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = isTimetableAdmin() ? document.getElementById('ev-user').value : getCurrentUserLabel();
                const date = document.getElementById('ev-date').value;
                const start = document.getElementById('ev-start').value;
                const end = document.getElementById('ev-end').value;

                const rules = {
                    'ev-title': 'Title is required',
                    'ev-date': 'Date is required',
                    'ev-start': 'Start time is required',
                    'ev-end': 'End time is required'
                };

                if (!window.validateForm(document.getElementById('scheduleModal'), rules)) {
                    return;
                }

                if (start >= end) {
                    showToastMsg('End time must be after start time.');
                    return;
                }

                // [START] Prevent scheduling in the past
                const now = new Date();
                const [year, month, day] = date.split('-').map(Number);
                const selectedDateOnly = new Date(year, month - 1, day);
                const todayOnly = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                if (selectedDateOnly < todayOnly) {
                    showToastMsg('Cannot schedule an activity for a past date.');
                    return;
                } else if (selectedDateOnly.getTime() === todayOnly.getTime() && start) {
                    const [sh, sm] = start.split(':').map(Number);
                    if (now.getHours() > sh || (now.getHours() === sh && now.getMinutes() > sm)) {
                        showToastMsg('Cannot schedule an activity for a past time today.');
                        return;
                    }
                }
                // [END]

                const selectedValues = Array.from(document.getElementById('ev-user').selectedOptions).map(o => o.value).filter(v => v !== '');

                let usersToAssign = [];
                if (selectedValues.includes('All Employees') || selectedValues.length === 0) {
                    usersToAssign = ALL_USERS_LIST.map(e => e.name || e.email);
                } else {
                    usersToAssign = selectedValues;
                }

                try {
                    // [START] - Unified Meeting Sync: Timetable events create a Meeting record for full cross-module visibility
                    const hostName = usersToAssign[0];
                    const host = ALL_USERS_LIST.find(u => (u.name || u.email) === hostName);
                    const attendeeIds = usersToAssign.slice(1).map(name => {
                        const u = ALL_USERS_LIST.find(emp => (emp.name || emp.email) === name);
                        return u ? u.id : null;
                    }).filter(id => id !== null);
                    const location = document.getElementById('ev-loc').value.trim() || '';

                    const meetingPayload = {
                        title: title,
                        date: `${date}T${start}:00`,
                        meeting_type: location.toLowerCase().includes('office') || location.toLowerCase().includes('visit') ? 'In-Person' : 'Google Meet',
                        content: `Scheduled via Timetable for ${usersToAssign.join(', ')}`,
                        host_id: host ? host.id : null,
                        attendee_ids: attendeeIds,
                        client_id: null,
                        priority: 'MEDIUM',
                        target_type: attendeeIds.length > 0 ? 'MANUAL' : 'CLIENT'
                    };

                    await ApiClient.createUnifiedMeeting(meetingPayload);
                    // [END]

                    usersToAssign.forEach(user => {
                        if (user && !selectedCalendars.has(user)) {
                            selectedCalendars.add(user);
                        }
                    });
                    saveSelectedCalendars();
                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg(`Unified meeting scheduled for ${usersToAssign.length} user(s)!`);
                } catch (error) {
                    console.error("Failed to schedule unified event", error);
                    alert("Failed to schedule event: " + (error?.message || "Unknown error"));
                }
            } else {
                // Task Creation
                const title = document.getElementById('ev-title').value.trim();
                const user = isTimetableAdmin() ? document.getElementById('ev-user').value : getCurrentUserLabel();
                const priority = document.getElementById('td-priority').value;
                let due = document.getElementById('td-start').value || document.getElementById('ev-date').value;
                const startStr = document.getElementById('td-start').value;
                const endStr = document.getElementById('td-end').value;
                const related = document.getElementById('td-related').value.trim();
                const desc = document.getElementById('td-desc').value.trim();

                const rules = {
                    'ev-title': 'Title is required'
                };

                if (!window.validateForm(document.getElementById('scheduleModal'), rules)) {
                    return;
                }

                if (!due) {
                    due = dStr(new Date());
                }

                let finalIsoStart = new Date(due).toISOString();

                const selectedValues = Array.from(document.getElementById('ev-user').selectedOptions).map(o => o.value).filter(v => v !== '');

                let usersToAssign = [];
                if (selectedValues.includes('All Employees')) {
                    usersToAssign = ['All Employees'];
                } else {
                    usersToAssign = selectedValues.length > 0 ? selectedValues : [null];
                }

                try {
                    const promises = usersToAssign.map(user => {
                        const payload = {
                            title: title,
                            description: desc || null,
                            priority: priority,
                            assigned_to: user,
                            due_date: finalIsoStart,
                            start_time: startStr ? startStr + ":00" : null,
                            end_time: endStr ? endStr + ":00" : null,
                            related_entity: related || null,
                            client_id: document.getElementById('ev-client').value || null
                        };
                        return ApiClient.createTodo(payload);
                    });

                    await Promise.all(promises);

                    usersToAssign.forEach(user => {
                        if (user && !selectedCalendars.has(user)) {
                            selectedCalendars.add(user);
                        }
                    });
                    saveSelectedCalendars();

                    // Reset form
                    ['td-related', 'td-desc'].forEach(id => {
                        const el = document.getElementById(id); if (el) el.value = '';
                    });
                    document.getElementById('ev-user').selectedIndex = -1;

                    bsModal.hide();
                    await renderCalendar();
                    showToastMsg(`To-Do Task created for ${usersToAssign.length} user(s)!`);
                } catch (error) {
                    console.error("Failed to create bulk tasks", error);
                    alert("Failed to create bulk tasks");
                }
            }
        }

        // ── Complete event (circle button click) ────────────────────
        async function completeEvent(uid) {
            const ev = events.find(e => e._uid === uid);
            if (!ev) return;

            if (ev.event_type === 'TODO') {
                const isCompleted = ev.status === 'COMPLETED';
                const newStatus = isCompleted ? 'PENDING' : 'COMPLETED';
                try {
                    await ApiClient.updateTodo(ev.id, { status: newStatus });
                    ev.status = newStatus;
                    renderCalendarLocal();
                    if (!isCompleted) showCompletedToast(uid);
                } catch (e) {
                    console.error("Failed to update Todo status.", e);
                    showToastMsg("Failed to update Todo");
                }
            } else {
                const wasCompleted = completedIds.has(uid);
                if (wasCompleted) {
                    completedIds.delete(uid);
                    renderCalendarLocal();
                    showToastMsg('Task marked as incomplete.');
                } else {
                    completedIds.add(uid);
                    renderCalendarLocal();
                    showCompletedToast(uid);
                }
            }
        }

        // Google Calendar-style completed toast with Undo
        let _toastEl = null;
        function showCompletedToast(uid) {
            if (_toastEl) _toastEl.remove();
            _toastEl = document.createElement('div');
            _toastEl.style.cssText = [
                'position:fixed;bottom:24px;left:50%;transform:translateX(-50%);',
                'background:#3c4043;color:#fff;padding:12px 20px;border-radius:8px;',
                'font-size:.875rem;font-weight:400;z-index:9999;',
                'display:flex;align-items:center;gap:16px;',
                'box-shadow:0 4px 16px rgba(0,0,0,.3);min-width:260px;'
            ].join('');
            _toastEl.innerHTML = `
                <span>Task completed</span>
                <button onclick="undoComplete('${uid}')" style="background:none;border:none;color:#8ab4f8;
                    font-size:.875rem;font-weight:600;cursor:pointer;padding:0;">Undo</button>
                <button onclick="this.closest('div').remove()" style="background:none;border:none;
                    color:#9aa0a6;font-size:1rem;cursor:pointer;padding:0;line-height:1;">&times;</button>`;
            document.body.appendChild(_toastEl);
            setTimeout(() => { if (_toastEl) { _toastEl.remove(); _toastEl = null; } }, 5000);
        }

        async function undoComplete(uid) {
            const ev = events.find(e => e._uid === uid);
            if (ev && ev.event_type === 'TODO') {
                try {
                    await ApiClient.updateTodo(ev.id, { status: 'PENDING' });
                    ev.status = 'PENDING';
                } catch (e) { console.error("Could not undo Todo status:", e); }
            } else {
                completedIds.delete(uid);
            }
            if (_toastEl) { _toastEl.remove(); _toastEl = null; }
            renderCalendarLocal();
        }

        // ── Toast ────────────────────────────────────────────────
        function showToastMsg(msg) {
            const t = document.createElement('div');
            t.style.cssText = 'position:fixed;bottom:24px;right:24px;background:#22c55e;color:#fff;padding:12px 20px;border-radius:10px;font-size:.875rem;font-weight:500;z-index:9999;box-shadow:0 4px 12px rgba(34,197,94,.4);';
            t.innerHTML = `<i class="bi bi-check-circle me-2"></i>${msg}`;
            document.body.appendChild(t);
            setTimeout(() => t.remove(), 3000);
        }

        // ── Auto-update current time line every minute ───────────
        setInterval(() => renderCalendar(), 60000);

        // ── Init ─────────────────────────────────────────────────
        async function initApp() {
            bsModal = new bootstrap.Modal(document.getElementById('scheduleModal'));
            document.getElementById('ev-date').value = dStr(new Date());

            try {
                currentUser = ApiClient.getCurrentUser();
                const emps = await ApiClient.getEmployees();
                ALL_USERS_LIST = isTimetableAdmin()
                    ? emps
                    : emps.filter(e => e.id === currentUser?.id || (e.name || e.email) === getCurrentUserLabel());

                // Populate Assignee dropdown
                const sel = document.getElementById('ev-user');
                sel.innerHTML = '<option value="">— Unassigned —</option>' +
                    (isTimetableAdmin() ? '<option value="All Employees" style="font-weight:bold; color:var(--primary);">Assign All Employees</option>' : '') +
                    ALL_USERS_LIST.map(e => {
                        const uniqueVal = e.name || e.email;
                        const role = (e.role || '').replace(/_/g, ' ');
                        return `<option value="${uniqueVal}">${e.name || e.email} (${role})</option>`;
                    }).join('');
                configureTimetableAssigneeSelect();

                const clients = await ApiClient.getClients();
                const clientSel = document.getElementById('ev-client');
                if (clientSel) {
                    clientSel.innerHTML = '<option value="">— No Client —</option>' +
                        clients.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
                }

                const currUserName = currentUser ? (currentUser.name || currentUser.email) : '';

                // Populate USERS palette
                emps.forEach((emp, index) => {
                    const identifier = emp.name || emp.email;
                    if (identifier) {
                        // Use a consistent hash for colour allocation
                        let hash = 0;
                        for (let i = 0; i < identifier.length; i++) {
                            hash = identifier.charCodeAt(i) + ((hash << 5) - hash);
                        }
                        const paletteContext = PALETTE[Math.abs(hash) % PALETTE.length];
                        USERS[identifier] = {
                            color: paletteContext.color,
                            bg: paletteContext.bg,
                            initials: getInitials(identifier)
                        };
                    }
                });

                // Load from localStorage or set defaults
                const savedCals = localStorage.getItem('timetable_selected_cals');
                if (savedCals) {
                    try {
                        const parsedCals = JSON.parse(savedCals);
                        if (Array.isArray(parsedCals)) {
                            parsedCals.forEach(c => selectedCalendars.add(c));
                        }
                    } catch (e) {
                        console.error('Failed to parse cached calendars', e);
                    }
                }

                // If nothing was parsed in localStorage, apply defaults
                if (selectedCalendars.size === 0) {
                    if (currUserName) selectedCalendars.add(currUserName);
                    selectedCalendars.add('Tasks');
                    selectedCalendars.add('Birthdays');
                    saveSelectedCalendars();
                }

                if (!isTimetableAdmin()) {
                    selectedCalendars.clear();
                    if (currUserName) selectedCalendars.add(currUserName);
                    selectedCalendars.add('Tasks');
                    selectedCalendars.add('Birthdays');
                    saveSelectedCalendars();
                }

            } catch (error) {
                console.error("Failed to initialize users", error);
                const userSel = document.getElementById('ev-user');
                if (userSel) userSel.innerHTML = '<option value="">— Unassigned —</option>';
            }

            renderCalendar();
        }

        initApp();
    </script>
