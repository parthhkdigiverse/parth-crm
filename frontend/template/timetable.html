<!DOCTYPE html>
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/frontend/favicon.ico">

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Timetable | SRM AI SETU</title>
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/theme.css?v=20260406">
    <link rel="stylesheet" href="/static/css/components.css?v=20260406">
    <style>
        .page-content-standard {
            padding-top: 1.5rem !important;
        }

        .cal-toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border-subtle);
            flex-shrink: 0;
            border-radius: 16px 16px 0 0;
            flex-wrap: wrap;
            gap: 12px;
            background: var(--bg-surface);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        @media (max-width: 900px) {
            .cal-toolbar {
                padding: 10px;
                gap: 8px;
            }

            .nav-title {
                font-size: 0.9rem;
                min-width: auto;
            }

            .nav-btn {
                width: 28px;
                height: 28px;
            }
        }

        @media (max-width: 600px) {
            .cal-toolbar {
                flex-direction: column;
                align-items: stretch;
            }

            .cal-toolbar>div {
                justify-content: space-between !important;
                width: 100%;
            }

            .view-pill button {
                padding: 4px 8px;
                font-size: 0.75rem;
            }

            .nav-title {
                order: 3;
                width: 100%;
                text-align: center;
                margin-top: 5px;
            }
        }

        .cal-toolbar .nav-btn {
            width: 30px;
            height: 30px;
            border-radius: 50%;
            border: 1px solid var(--border-subtle);
            background: var(--bg-app);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: .85rem;
            color: var(--text-muted);
        }

        .cal-toolbar .nav-btn:hover {
            background: var(--border-subtle);
        }

        .nav-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-main);
            min-width: 180px;
        }

        .view-pill {
            display: inline-flex;
            border: 1px solid var(--border-subtle);
            border-radius: 8px;
            overflow: hidden;
        }

        .view-pill button {
            border: none;
            background: var(--bg-app);
            padding: 4px 14px;
            font-size: .8rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .view-pill button.active {
            background: #2563eb;
            color: #fff;
        }

        /* ── Calendar container ──────────────────────────────── */
        .cal-wrapper {
            display: flex;
            min-height: calc(100vh - 200px);
            background: var(--bg-surface);
            border-top: 1px solid var(--border-subtle);
            border-radius: 0 0 16px 16px;
            overflow: hidden;
        }

        .cal-sidebar {
            width: 256px;
            flex-shrink: 0;
            padding: 12px;
            overflow-y: auto;
            /* Allow scrolling if absolutely needed, but we hide the bar */
            scrollbar-width: none;
            /* Firefox */
            -ms-overflow-style: none;
            /* IE/Edge */
            border-right: 1px solid var(--border-subtle);
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .cal-sidebar::-webkit-scrollbar {
            display: none;
            /* Chrome/Safari/Brave */
        }

        @media (max-height: 800px) {
            .cal-sidebar {
                padding: 8px;
                gap: 8px;
                width: 230px;
            }

            .sidebar-section {
                margin-bottom: 12px;
            }
        }

        .cal-root {
            display: flex;
            flex-direction: column;
            flex: 1;
            min-width: 0;
            height: 100%;
            background: var(--bg-surface);
        }

        /* ── Sidebar Checks ──────────────────────────────────── */
        .sidebar-section {
            margin-bottom: 24px;
        }

        .sidebar-title {
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: .85rem;
            font-weight: 500;
            color: var(--text-main);
            margin-bottom: 12px;
            cursor: pointer;
        }

        .sidebar-title:hover {
            color: #202124;
        }

        .check-item {
            display: flex;
            align-items: center;
            font-size: .85rem;
            color: var(--text-main);
            margin-bottom: 8px;
            cursor: pointer;
        }

        .accent-checkbox {
            appearance: none;
            width: 16px;
            height: 16px;
            border-radius: 3px;
            border: 2px solid var(--c);
            background: transparent;
            margin: 0;
            margin-right: 12px;
            position: relative;
            cursor: pointer;
        }

        .accent-checkbox:checked {
            background: var(--c);
        }

        .accent-checkbox:checked::after {
            content: '';
            position: absolute;
            left: 4px;
            top: 1px;
            width: 5px;
            height: 9px;
            border: solid white;
            border-width: 0 2px 2px 0;
            transform: rotate(45deg);
        }

        /* ── Mini Calendar ───────────────────────────────────── */
        .mini-grid {
            padding: 0 4px;
        }

        .mini-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 4px;
        }

        .mini-row.head .mc {
            color: var(--text-muted);
            font-weight: 500;
            font-size: .65rem;
            pointer-events: none;
            background: transparent !important;
        }

        .mc {
            width: 20px;
            height: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: .7rem;
            border-radius: 50%;
            cursor: pointer;
            color: var(--text-main);
            transition: background .15s;
            font-weight: 500;
        }

        .mc:hover {
            background: var(--border-subtle);
        }

        .mc.off {
            color: var(--text-muted);
        }

        .mc.s {
            background: var(--primary-light);
            color: var(--primary);
        }

        .mc.t {
            background: var(--primary);
            color: #fff;
            font-weight: 600;
        }

        .mc.t:hover {
            background: #1765cc;
        }

        /* Day header row */
        .cal-day-header-row {
            display: flex;
            border-bottom: 2px solid var(--border-subtle);
            flex-shrink: 0;
            background: var(--bg-surface);
        }

        .cal-gutter-head {
            width: 56px;
            flex-shrink: 0;
        }

        .cal-dh {
            flex: 1;
            text-align: center;
            padding: 6px 0;
            border-left: 1px solid #f1f5f9;
        }

        .cal-dh .dn {
            font-size: .68rem;
            letter-spacing: .06em;
            color: #94a3b8;
            font-weight: 600;
            text-transform: uppercase;
        }

        .cal-dh .dd {
            font-size: 1.35rem;
            font-weight: 700;
            color: #334155;
            line-height: 1.3;
        }

        .cal-dh.today .dn {
            color: #2563eb;
        }

        .cal-dh .today-dot {
            background: #2563eb;
            color: #fff;
            border-radius: 50%;
            width: 34px;
            height: 34px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
        }

        /* Scrollable time grid */
        .cal-scroll {
            flex: 1;
            overflow-y: auto;
            overflow-x: hidden;
        }

        .cal-body-inner {
            display: flex;
            position: relative;
        }

        /* Time gutter */
        .cal-gutter {
            width: 56px;
            flex-shrink: 0;
            position: sticky;
            left: 0;
            background: var(--bg-surface);
            z-index: 4;
        }

        .cal-hour-lbl {
            height: 60px;
            display: flex;
            align-items: flex-start;
            justify-content: flex-end;
            padding: 3px 8px 0 0;
            font-size: .68rem;
            color: #94a3b8;
            box-sizing: border-box;
        }

        /* Day columns */
        .cal-cols {
            flex: 1;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
        }

        .cal-col {
            position: relative;
            border-left: 1px solid #f1f5f9;
            box-sizing: border-box;
        }

        .cal-col.today-col {
            background: rgba(79, 70, 229, .03);
        }

        .cal-hline {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px solid #e2e8f0;
            pointer-events: none;
        }

        .cal-hline-half {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 1px dashed #f1f5f9;
            pointer-events: none;
        }

        /* Events */
        .cal-evt {
            position: absolute;
            left: 2px;
            right: 2px;
            border-radius: 6px;
            padding: 4px 6px;
            overflow: hidden;
            cursor: pointer;
            transition: filter .15s;
            z-index: 2;
            box-sizing: border-box;
            max-height: 64px;
        }

        .cal-evt:hover {
            filter: brightness(.93);
        }

        .evt-title {
            font-size: .72rem;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .evt-time {
            font-size: .65rem;
            opacity: .8;
            margin-top: 1px;
        }

        .evt-user {
            position: absolute;
            bottom: 3px;
            right: 5px;
            font-size: .6rem;
            font-weight: 700;
            opacity: .65;
        }

        /* Current time indicator */
        .now-dot {
            position: absolute;
            left: -5px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #ef4444;
            transform: translateY(-50%);
            z-index: 6;
        }

        .now-line {
            position: absolute;
            left: 0;
            right: 0;
            border-top: 2px solid #ef4444;
            transform: translateY(-50%);
            z-index: 5;
        }

        /* ── Modal styling ───────────────────────────────────── */
        /* Modal styling */
        .modal-content {
            border-radius: 16px;
            border: none;
        }

        .modal-header {
            border-bottom: none;
            padding: 24px 24px 8px;
        }

        .modal-body {
            padding: 8px 24px 16px;
        }

        .modal-footer {
            border-top: none;
            padding: 0 24px 20px;
        }

        /* Complete circle button on each event */
        .evt-complete-btn {
            position: absolute;
            top: 4px;
            left: 4px;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            border: 2px solid currentColor;
            background: transparent;
            cursor: pointer;
            flex-shrink: 0;
            z-index: 3;
            transition: background .15s, transform .15s;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .evt-complete-btn:hover {
            transform: scale(1.2);
        }

        .evt-complete-btn.done {
            background: currentColor;
        }

        .evt-complete-btn.done::after {
            content: '';
            display: block;
            width: 6px;
            height: 4px;
            border-left: 1.5px solid #fff;
            border-bottom: 1.5px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
        }

        /* Completed event: strikethrough + faded */
        .cal-evt.evt-done .evt-inner-title {
            text-decoration: line-through;
            opacity: .5;
        }

        .cal-evt.evt-done {
            opacity: .6;
        }

        /* ── Month view ─────────── */
        .month-header .cal-dh {
            padding: 8px 0;
            border: none;
            border-right: 1px solid #e2e8f0;
        }

        .month-header .cal-dh:last-child {
            border-right: none;
        }

        .month-grid {
            display: flex;
            flex-direction: column;
            min-height: 100%;
            border-left: 1px solid #e2e8f0;
        }

        .month-row {
            display: flex;
            flex: 1;
            min-height: 120px;
            border-bottom: 1px solid #e2e8f0;
        }

        .month-cell {
            flex: 1;
            border-right: 1px solid #e2e8f0;
            padding: 4px;
            display: flex;
            flex-direction: column;
            cursor: pointer;
            transition: background .1s;
        }

        .month-cell:hover {
            background: var(--bg-app);
        }

        .month-cell.off-month {
            background: var(--bg-app);
            opacity: .4;
        }

        .month-cell.today-cell {
            background: var(--primary-light);
        }

        .month-cell-num {
            font-size: .85rem;
            font-weight: 500;
            color: #475569;
            padding: 4px;
            text-align: center;
            border-radius: 50%;
            width: 26px;
            height: 26px;
            line-height: 18px;
            margin: 0 auto 4px auto;
        }

        .month-cell-num.today-num {
            background: #2563eb;
            color: #fff;
        }

        .month-cell-evts {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 2px;
        }

        .month-evt {
            font-size: .7rem;
            padding: 2px 4px;
            border-radius: 4px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            cursor: pointer;
        }

        .month-evt:hover {
            filter: brightness(.9);
        }

        .month-evt.evt-done {
            text-decoration: line-through;
            opacity: .6;
        }

        .month-evt-more {
            font-size: .65rem;
            color: #64748b;
            text-align: center;
            margin-top: 2px;
            font-weight: 600;
        }

        /* ── Legend pill ─────────────────────────────────────── */
        .leg-dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            flex-shrink: 0;
        }

        /* ── Switch to Tasks view ─────────────────────────────── */
        .task-toggle-btn {
            width: 32px;
            height: 32px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            display: inline-flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: var(--text-muted);
            font-size: 1rem;
            position: relative;
            transition: background .15s, color .15s;
        }

        .task-toggle-btn:hover {
            background: var(--bg-app);
            color: var(--primary);
        }

        .task-toggle-btn.active {
            background: #e8eafd;
            color: #2563eb;
            border-color: #c7d2fe;
        }

        /* Sidebar Toggle Logic */
        .cal-sidebar.minimized {
            width: 0 !important;
            min-width: 0 !important;
            padding: 0 !important;
            overflow: hidden;
            border: none !important;
            margin: 0 !important;
        }

        /* Premium Modal Overhaul & Fit to Screen Fix */
        /* Premium Modal Overhaul & Fit to Screen Fix */
        .premium-card-modal .modal-dialog {
            margin-top: 2rem;
            margin-bottom: 2rem;
        }

        .premium-card-modal .modal-body {
            max-height: calc(100vh - 200px);
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: var(--border-subtle) transparent;
        }

        #scheduleModal.premium-card-modal .modal-content {
            border-radius: 20px;
            box-shadow: 0 24px 64px -8px rgba(0, 0, 0, .35) !important;
            border: none;
            overflow: hidden;
        }

        /* Modal gradient header */
        .modal-header-strip {
            background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 60%, #4f46e5 100%);
            padding: 1.4rem 1.5rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .modal-header-title {
            color: #fff;
            font-weight: 700;
            font-size: 1.1rem;
            margin: 0;
        }

        .modal-header-sub {
            color: rgba(255, 255, 255, .7);
            font-size: 0.78rem;
            margin: 2px 0 0;
        }

        .modal-header-icon-tt {
            width: 44px;
            height: 44px;
            background: rgba(255, 255, 255, 0.18);
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.4rem;
            color: #fff;
            flex-shrink: 0;
        }

        #scheduleModal .form-control,
        #scheduleModal .form-select {
            background: var(--bg-app);
            border-color: var(--border-subtle);
            color: var(--text-main);
            border-radius: 10px;
        }

        #scheduleModal .form-control:focus,
        #scheduleModal .form-select:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(37, 99, 235, .15);
        }

        .type-toggle-premium {
            background: var(--bg-app);
            padding: 5px;
            border-radius: 16px;
            display: flex;
            border: 1px solid var(--border-subtle);
            gap: 4px;
        }

        .type-toggle-premium .btn-check+.btn {
            flex: 1;
            padding: 10px;
            border-radius: 12px;
            font-size: 0.9rem;
            font-weight: 700;
            border: none;
            color: var(--text-muted);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            background: transparent;
        }

        .type-toggle-premium .btn-check:checked+.btn {
            background: var(--bg-surface);
            color: var(--primary);
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.1);
        }

        .modal-icon-badge {
            width: 48px;
            height: 48px;
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--primary-light);
            color: var(--primary);
            border-radius: 14px;
            font-size: 1.5rem;
        }

        .cal-content.expanded {
            width: 100% !important;
            flex: 0 0 100% !important;
            max-width: 100% !important;
        }

        .toggle-sb-btn {
            background: var(--bg-app);
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 8px;
            font-size: 0.85rem;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 6px;
            transition: all 0.2s;
        }

        .toggle-sb-btn:hover {
            background: var(--surface);
            color: var(--text-main);
        }

        .toggle-sb-btn.active {
            background: #e0e7ff;
            color: #4338ca;
            border-color: #c7d2fe;
        }

        .task-toggle-btn .tt-tip {
            position: absolute;
            top: calc(100% + 6px);
            right: 0;
            background: #3c4043;
            color: #fff;
            font-size: .72rem;
            font-weight: 500;
            padding: 4px 8px;
            border-radius: 4px;
            white-space: nowrap;
            opacity: 0;
            pointer-events: none;
            transition: opacity .2s;
            z-index: 20;
        }

        .task-toggle-btn:hover .tt-tip {
            opacity: 1;
        }

        /* Task list view */
        .task-view-wrap {
            padding: 24px 32px;
            flex: 1;
            overflow-y: auto;
        }

        .task-date-group {
            margin-bottom: 28px;
        }

        .task-date-lbl {
            font-size: .78rem;
            font-weight: 700;
            color: #64748b;
            text-transform: uppercase;
            letter-spacing: .06em;
            margin-bottom: 10px;
        }

        .task-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 12px 16px;
            background: var(--bg-surface);
            border-radius: 10px;
            box-shadow: 0 1px 4px rgba(0, 0, 0, .2);
            margin-bottom: 8px;
            border-left: 4px solid var(--primary);
            transition: box-shadow .15s;
        }

        .task-row:hover {
            box-shadow: 0 3px 10px rgba(0, 0, 0, .1);
        }

        .task-row.done-row {
            opacity: .55;
        }

        .task-row .t-circle {
            width: 18px;
            height: 18px;
            border-radius: 50%;
            border: 2px solid currentColor;
            cursor: pointer;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background .15s, transform .15s;
        }

        .task-row .t-circle:hover {
            transform: scale(1.15);
        }

        .task-row .t-circle.t-done {
            background: currentColor;
        }

        .task-row .t-circle.t-done::after {
            content: '';
            display: block;
            width: 8px;
            height: 5px;
            border-left: 2px solid #fff;
            border-bottom: 2px solid #fff;
            transform: rotate(-45deg) translateY(-1px);
        }

        .task-row .t-info {
            flex: 1;
            min-width: 0;
        }

        .task-row .t-title {
            font-weight: 600;
            font-size: .88rem;
            color: #1e293b;
        }

        .task-row.done-row .t-title {
            text-decoration: line-through;
            color: #94a3b8;
        }

        .task-row .t-meta {
            font-size: .75rem;
            color: #64748b;
            margin-top: 2px;
        }

        .task-filter-pill {
            display: inline-flex;
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            margin-bottom: 20px;
        }

        .task-filter-pill button {
            border: none;
            background: var(--surface);
            padding: 5px 16px;
            font-size: .8rem;
            color: var(--text-muted);
            cursor: pointer;
        }

        .task-filter-pill button.active {
            background: #2563eb;
            color: #fff;
        }

        /* Timeline Pinned Section */
        .tt-pinned-row {
            min-height: 42px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 0 10px;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
        }

        .tt-pinned-row::-webkit-scrollbar {
            display: none;
        }

        /* Pinned Capsules */
        .tt-pinned-capsule {
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 4px 8px;
            border-radius: 6px;
            font-size: 0.75rem;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 1px 2px rgba(0, 0, 0, 0.05);
            transition: transform 0.15s, box-shadow 0.15s;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            width: 100%;
        }

        .tt-pinned-capsule:hover {
            transform: translateY(-1px);
            box-shadow: 0 3px 6px rgba(0, 0, 0, 0.08);
        }

        .tt-pinned-row-week {
            display: flex;
            flex-direction: column;
            gap: 4px;
            padding: 4px;
            min-height: 42px;
            background: var(--surface);
        }

        .tt-pinned-row-day {
            min-height: 42px;
            background: var(--bg-app);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            padding: 8px 10px;
            gap: 8px;
            flex-wrap: wrap;
        }

        /* ── Centering in content area ── */
        @media (min-width: 992px) {
            .premium-card-modal {
                padding-left: var(--sb-width, 260px) !important;
            }

            .premium-card-modal .modal-dialog {
                margin-left: auto;
                margin-right: auto;
                transform: translateX(-20px);
                /* "Bit left side" nudge */
            }
        }
    </style>

</head>

<body>

    <!-- ─── App Layout ───────────────────────────────────── -->
    <div class="d-flex" style="min-height:100vh;">
        <div id="sidebar" style="flex-shrink:0;"></div>
        <div class="flex-grow-1 d-flex flex-column main-wrapper">
            <div class="page-content-standard" style="display:flex; flex-direction:column; flex:1;">
                <div id="main-content" class="card border-0 shadow-sm"
                    style="flex:1; display:flex; flex-direction:column; border-radius:16px; overflow:hidden;"></div>
            </div>
        </div>
    </div>

    <!-- ─── Premium Unified Schedule/Task Modal ──────────────────────── -->
    <!-- [START] - Premium Unified Schedule/Task Modal -->
    <div class="modal fade premium-card-modal p-0" id="scheduleModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered" style="max-width: 600px;">
            <div class="modal-content shadow-lg border-0"
                style="border-radius: 20px; overflow: hidden; background: var(--surface);">

                <!-- Modal Head Section with Gradient -->
                <div class="modal-header-strip px-3 py-3"
                    style="background: linear-gradient(135deg, #1e3a8a 0%, #2563eb 100%);">
                    <div class="d-flex align-items-center gap-3">
                        <div class="modal-header-icon-tt shadow-sm"
                            style="background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.1); width: 38px; height: 38px; font-size: 1.2rem;">
                            <i class="bi bi-calendar-event"></i>
                        </div>
                        <div>
                            <h5 class="modal-header-title mb-0" id="modal-title-text"
                                style="color:#fff; font-weight:700; font-size: 1rem;">Schedule Activity</h5>
                            <p class="modal-header-sub mb-0 text-white-50" style="font-size: 0.75rem;">Plan meetings or
                                assign tasks</p>
                        </div>
                    </div>
                    <button type="button" class="btn-close btn-close-white opacity-50 shadow-none"
                        data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body p-3" style="max-height: 65vh; overflow-y: auto;">
                    <div class="row g-2">
                        <!-- Premium Type Toggle -->
                        <div class="col-12 mb-2">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">Activity
                                Classification</label>
                            <div class="type-toggle-premium">
                                <input type="radio" class="btn-check" name="actType" id="typeEvent" value="EVENT"
                                    checked onchange="toggleModalType()">
                                <label class="btn btn-outline-primary py-1" for="typeEvent">
                                    <i class="bi bi-camera-video me-1"></i> Event / Meeting
                                </label>
                                <input type="radio" class="btn-check" name="actType" id="typeTask" value="TASK"
                                    onchange="toggleModalType()">
                                <label class="btn btn-outline-primary py-1" for="typeTask">
                                    <i class="bi bi-check2-square me-1"></i> Workspace Task
                                </label>
                            </div>
                        </div>

                        <!-- Objective Title -->
                        <div class="col-12 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-type me-1"></i>Activity Name <span class="text-danger">*</span>
                            </label>
                            <input type="text" id="ev-title" class="form-control border-light-subtle shadow-none"
                                placeholder="Activity Name" style="border-radius:10px; font-weight: 500;">
                        </div>

                        <!-- Date Group -->
                        <div class="col-md-6 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1"
                                id="ev-date-label">
                                <i class="bi bi-calendar-check me-1"></i>Date <span class="text-danger">*</span>
                            </label>
                            <input type="date" id="ev-date" class="form-control border-light-subtle shadow-none"
                                style="border-radius:10px;">
                        </div>

                        <!-- Priority Selection (Shared) -->
                        <div class="col-md-6 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-flag me-1"></i>Priority
                            </label>
                            <select id="td-priority" class="form-select border-light-subtle shadow-none"
                                style="border-radius:10px; font-weight: 500;">
                                <option value="LOW">Low</option>
                                <option value="MEDIUM" selected>Medium</option>
                                <option value="HIGH">High</option>
                            </select>
                        </div>

                        <!-- Time Selection -->
                        <div class="col-md-6 mb-2 event-fields">
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-premium-label small text-uppercase fw-bold text-secondary"
                                        id="ev-start-label">Start Time</label>
                                    <input type="time" id="ev-start"
                                        class="form-control border-light-subtle shadow-none"
                                        style="border-radius:10px;">
                                </div>
                                <div class="col-6">
                                    <label class="form-premium-label small text-uppercase fw-bold text-secondary"
                                        id="ev-end-label">End Time</label>
                                    <input type="time" id="ev-end" class="form-control border-light-subtle shadow-none"
                                        style="border-radius:10px;">
                                </div>
                            </div>
                        </div>

                        <div class="col-md-6 mb-2 task-fields" style="display:none;">
                            <div class="row g-2">
                                <div class="col-6">
                                    <label class="form-premium-label small text-uppercase fw-bold text-secondary">Start
                                        (Opt)</label>
                                    <input type="time" id="td-start"
                                        class="form-control border-light-subtle shadow-none"
                                        style="border-radius:10px;">
                                </div>
                                <div class="col-6">
                                    <label class="form-premium-label small text-uppercase fw-bold text-secondary">End
                                        (Opt)</label>
                                    <input type="time" id="td-end" class="form-control border-light-subtle shadow-none"
                                        style="border-radius:10px;">
                                </div>
                            </div>
                        </div>

                        <div class="col-12 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-person me-1"></i>Assign To
                            </label>
                            <select id="ev-user" class="form-select border-light-subtle shadow-none" multiple
                                style="border-radius:10px; min-height: 70px;">
                                <option value="">— Loading... —</option>
                            </select>
                            <div class="form-text smaller mt-0 mb-1">Hold Ctrl (Cmd) to select multiple</div>
                        </div>

                        <div class="col-md-6 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-geo-alt me-1"></i>Location / Link
                            </label>
                            <input type="text" id="ev-loc"
                                class="form-control border-light-subtle shadow-none event-fields"
                                placeholder="Meeting room or link" style="border-radius:10px;">
                            <input type="text" id="td-related"
                                class="form-control border-light-subtle shadow-none task-fields"
                                placeholder="Project or lead reference" style="border-radius:10px; display:none;">
                        </div>

                        <div class="col-md-6 mb-1">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-person-bounding-box me-1"></i>Linked Client
                            </label>
                            <select id="ev-client" class="form-select border-light-subtle shadow-none"
                                style="border-radius:10px;">
                                <option value="">— General / Internal —</option>
                            </select>
                        </div>

                        <div class="col-12 task-fields mb-1" style="display:none;">
                            <label class="form-label fw-bold text-secondary small text-uppercase mb-1">
                                <i class="bi bi-text-left me-1"></i>Context/Description
                            </label>
                            <textarea id="td-desc" class="form-control border-light-subtle shadow-none" rows="2"
                                placeholder="Briefly describe the task objective..."
                                style="border-radius:10px; resize: none;"></textarea>
                        </div>
                    </div>
                </div>

                <div class="modal-footer px-3 pb-3 pt-2 gap-2 border-0">
                    <button type="button" id="btn-delete-event" class="btn btn-outline-danger btn-sm me-auto px-3"
                        style="border-radius:10px; font-weight: 600; display: none;" onclick="deleteActivity()">
                        <i class="bi bi-trash3 me-1"></i>Purge
                    </button>
                    <button type="button" class="btn btn-light btn-sm px-3" data-bs-dismiss="modal"
                        style="border-radius:10px; font-weight: 600;">Cancel</button>
                    <button type="button" id="btn-save-event" class="btn btn-primary btn-sm px-4"
                        onclick="saveActivity()"
                        style="border-radius:10px; font-weight: 600; background: #2563eb; border: none; box-shadow: 0 4px 12px rgba(37,99,235,0.2);">
                        <i class="bi bi-send-check me-1"></i>Publish Schedule
                    </button>
                </div>
            </div>
        </div>
    </div>

    <!-- ─── Scripts ───────────────────────────────────────── -->
    <script src="/static/js/utils.js?v=20260403"></script>
    <script src="/static/js/api.js?v=20260403"></script>
    <script src="/static/js/auth.js?v=20260403"></script>
    <script src="/static/js/ui_components.js?v=20260403"></script>
    <script src="/static/js/app.js?v=20260403"></script>
    <script src="/static/js/bootstrap.bundle.min.js"></script>

    <script>
        // ── Auth & Sidebar ──────────────────────────────────────
        requireAuth();
        const sb = document.getElementById('sidebar');
        if (sb) sb.innerHTML = renderSidebar('timetable');
        injectTopHeader('Timetable');

        // ── Constants ───────────────────────────────────────────
        const HOUR_H = 60;   // px per hour
        const START_HR = 7;    // 7 AM
        const END_HR = 21;   // 9 PM
        const DAY_NAMES = ['SUN', 'MON', 'TUE', 'WED', 'THU', 'FRI', 'SAT'];

        // ── User colour palette ─────────────────────────────────
        let USERS = {};
        let ALL_USERS_LIST = [];
        let selectedCalendars = new Set();
        let currentUser = null;

        function isTimetableAdmin() {
            return currentUser && currentUser.role === 'ADMIN';
        }

        function getCurrentUserLabel() {
            return currentUser ? (currentUser.name || currentUser.email || '') : '';
        }

        function configureTimetableAssigneeSelect() {
            const sel = document.getElementById('ev-user');
            if (!sel) return;

            if (isTimetableAdmin()) {
                sel.disabled = false;
                return;
            }

            const currentLabel = getCurrentUserLabel();
            sel.innerHTML = currentLabel
                ? `<option value="${currentLabel}">${currentLabel}</option>`
                : '<option value="">My Schedule</option>';
            sel.value = currentLabel;
            sel.disabled = true;
        }

        const PALETTE = [
            { color: '#2563eb', bg: 'rgba(37,99,235,.13)' },   // Royal Blue
            { color: '#0891b2', bg: 'rgba(8,145,178,.13)' },   // Cyan
            { color: '#16a34a', bg: 'rgba(22,163,74,.13)' },   // Green
            { color: '#dc2626', bg: 'rgba(220,38,38,.13)' },   // Red
            { color: '#eab308', bg: 'rgba(234,179,8,.13)' },   // Yellow/Gold
            { color: '#d946ef', bg: 'rgba(217,70,239,.13)' },  // Magenta
            { color: '#f97316', bg: 'rgba(249,115,22,.13)' },  // Orange
            { color: '#8b5cf6', bg: 'rgba(139,92,246,.13)' },  // Violet
            { color: '#6366f1', bg: 'rgba(99,102,241,.13)' },  // Indigo
            { color: '#ec4899', bg: 'rgba(236,72,153,.13)' },  // Pink
            { color: '#14b8a6', bg: 'rgba(20,184,166,.13)' },  // Teal
            { color: '#f59e0b', bg: 'rgba(245,158,11,.13)' },  // Amber
            { color: '#3b82f6', bg: 'rgba(59,130,246,.13)' },  // Blue
            { color: '#ef4444', bg: 'rgba(239,68,68,.13)' },   // Rose
            { color: '#84cc16', bg: 'rgba(132,204,22,.13)' },  // Lime
            { color: '#06b6d4', bg: 'rgba(6,182,212,.13)' }    // Sky
        ];

        function getInitials(name) {
            if (!name) return '?';
            const parts = name.trim().split(' ');
            if (parts.length > 1) return (parts[0][0] + parts[1][0]).toUpperCase();
            return name.substring(0, 2).toUpperCase();
        }

        function saveSelectedCalendars() {
            localStorage.setItem('timetable_selected_cals', JSON.stringify(Array.from(selectedCalendars)));
        }

        function toggleCalendar(identifier, isChecked) {
            if (isChecked) {
                selectedCalendars.add(identifier);
            } else {
                selectedCalendars.delete(identifier);
            }
            saveSelectedCalendars();

            const scrollY = window.scrollY;
            const ms = document.getElementById('main-content');
            const mainScroll = ms ? ms.scrollTop : 0;
            const sbDOM = document.querySelector('.cal-sidebar');
            const sbScroll = sbDOM ? sbDOM.scrollTop : 0;
            if (ms && ms.offsetHeight > 0) ms.style.minHeight = ms.offsetHeight + 'px';

            renderCalendarLocal();

            requestAnimationFrame(() => {
                window.scrollTo(0, scrollY);
                const newMs = document.getElementById('main-content');
                if (newMs) {
                    newMs.scrollTop = mainScroll;
                    newMs.style.minHeight = '';
                }
                const newSb = document.querySelector('.cal-sidebar');
                if (newSb) newSb.scrollTop = sbScroll;
            });
        }

        // ── Navigation state ─────────────────────────────────────
        let weekStart = getWeekStart(new Date());
        let selectedDate = new Date();
        let currentView = 'week';
        let showTaskView = false;          // NEW: task list mode toggle
        let taskFilter = 'all';          // 'all' | 'pending' | 'done' | 'my' | 'employees'
        let bsModal;
        const completedIds = new Set();
        let miniMonthOffset = 0;
        let isMyCalsOpen = false;         // Default to collapsed to save space
        let isOtherCalsOpen = false;
        let isSidebarMinimized = window.innerWidth < 1200 || window.innerHeight < 750;  // Auto-minimize on small widths or heights

        // ── Status colour palette ───────────────────────────────
        const STATUS_COLORS = {
            'OPEN': { color: 'var(--warning-text)', bg: 'var(--warning-light)' },
            'IN_PROGRESS': { color: 'var(--primary)', bg: 'var(--primary-light)' },
            'RESOLVED': { color: 'var(--success-text)', bg: 'var(--success-light)' },
            'BLOCKED': { color: 'var(--danger-text)', bg: 'var(--danger-light)' },
            'CANCELLED': { color: 'var(--danger-text)', bg: 'var(--danger-light)' },
            'CANCEL': { color: 'var(--danger-text)', bg: 'var(--danger-light)' },
        };

        function getEventStyles(ev) {
            const status = (ev.status || '').toUpperCase();

            // Generate basic styles for unknown users dynamically
            const defaultInitials = (ev.user || '?').substring(0, 2).toUpperCase();
            const baseUser = USERS[ev.user] || { color: '#6b7280', bg: 'rgba(107,114,128,0.13)', initials: defaultInitials };

            // Priority for Meetings or if status is explicitly actionable (Done/Cancelled)
            if (ev.event_type === 'MEETING' || status === 'RESOLVED' || status === 'CANCELLED' || status === 'CANCEL') {
                if (STATUS_COLORS[status]) {
                    return {
                        ...STATUS_COLORS[status],
                        initials: baseUser.initials
                    };
                }
            }
            return baseUser;
        }

        // ── Computed week events ─────────────────────────────────
        let events = [];

        // ── Helpers ─────────────────────────────────────────────
        function getWeekStart(d) {
            const dt = new Date(d);
            dt.setDate(dt.getDate() - dt.getDay());
            dt.setHours(0, 0, 0, 0);
            return dt;
        }
        function addDays(d, n) {
            const r = new Date(d); r.setDate(r.getDate() + n); return r;
        }
        function dStr(d) {
            const y = d.getFullYear(), m = String(d.getMonth() + 1).padStart(2, '0'), day = String(d.getDate()).padStart(2, '0');
            return `${y}-${m}-${day}`;
        }

        function fmtH(h, m) {
            const ampm = h >= 12 ? 'PM' : 'AM';
            const h12 = h % 12 || 12;
            return `${h12}:${String(m).padStart(2, '0')} ${ampm}`;
        }

        function topPx(h, m) { return (h - START_HR) * HOUR_H + (m / 60) * HOUR_H; }
        function hPx(sh, sm, eh, em) {
            return Math.max(((eh - sh) * 60 + (em - sm)) / 60 * HOUR_H, 20);
        }

        // ── Load events from API ────────────────────────────────
        async function fetchEvents(startStr, endStr) {
            try {
                const data = await ApiClient.getTimetable(startStr, endStr);
                const evts = data.events || [];
                // [START] - Standardize priority mapping to uppercase for reliable pinning
                evts.forEach(e => {
                    e._uid = e.event_type + '_' + e.id;
                    let p = e.priority || 'MEDIUM';
                    if (p && String(p).includes('.')) p = String(p).split('.')[1];
                    e.priority = String(p).toUpperCase();
                });
                return evts;
                // [END]
            } catch (error) {
                console.error("Failed to load timetable events:", error);
                return [];
            }
        }

        // ── Event actions ───────────────────────────────────────
        async function saveEvent() {
            // Legacy/Redundant - replaced by saveActivity
            return saveActivity();
        }


        async function completeEvent(uid) {
            const [type, id] = uid.split('_');
            const isDoneNow = !completedIds.has(uid);

            if (isDoneNow) {
                completedIds.add(uid);
            } else {
                completedIds.delete(uid);
            }

            // Re-render immediately for UI responsiveness
            renderCalendarLocal();

            if (type === 'TODO') {
                try {
                    await ApiClient.updateTodo(id, { status: isDoneNow ? 'RESOLVED' : 'OPEN' });
                    // Refresh data from server to ensure consistency
                    await renderCalendar();
                } catch (error) {
                    console.error("Failed to update task status:", error);
                    // Rollback on error? Maybe just show toast.
                }
            }
        }

        // ── Navigation functions ────────────────────────────────
        function navWeek(n) {
            weekStart = addDays(weekStart, n * 7);
            renderCalendar();
        }

        function navDay(n) {
            selectedDate = addDays(selectedDate, n);
            weekStart = getWeekStart(selectedDate);
            renderCalendar();
        }

        function goToday() {
            weekStart = getWeekStart(new Date());
            selectedDate = new Date();
            renderCalendar();
        }

        function setView(view) {
            currentView = view;
            renderCalendar();
        }

        function selectDay(dateStr) {
            selectedDate = new Date(dateStr);
            currentView = 'day';
            renderCalendar();
        }

        function toggleTaskView() {
            showTaskView = !showTaskView;
            renderCalendar();
        }

        function setTaskFilter(filter) {
            taskFilter = filter;
            renderCalendar();
        }

        function toggleCalSidebar() {
            isSidebarMinimized = !isSidebarMinimized;
            renderCalendarLocal();
        }

        // ── Sidebar generator ───────────────────────────────────
        function buildSidebar() {
            const currUserName = currentUser ? (currentUser.name || currentUser.email) : '';
            const currUserObj = USERS[currUserName] || { color: '#1a73e8' };

            // Generate My calendars list (Current user + Birthdays + Tasks)
            const myCals = `
            <div class="sidebar-section">
                <div class="sidebar-title" data-bs-toggle="collapse" data-bs-target="#myCalendarsCollapse" aria-expanded="${isMyCalsOpen ? 'true' : 'false'}" style="cursor:pointer;" onclick="isMyCalsOpen=!isMyCalsOpen">
                    <span>My calendars</span>
                    <i class="bi bi-chevron-down text-muted"></i>
                </div>
                <div id="myCalendarsCollapse" class="collapse ${isMyCalsOpen ? 'show' : ''}">
                    ${currUserName ? `
                    <label class="check-item">
                        <input type="checkbox" ${selectedCalendars.has(currUserName) ? 'checked' : ''} onchange="toggleCalendar('${currUserName.replace(/'/g, "\\'")}', this.checked)" class="accent-checkbox" style="--c:${currUserObj.color}"> ${currUserName}
                    </label>` : ''}
                    <label class="check-item">
                        <input type="checkbox" ${selectedCalendars.has('Birthdays') ? 'checked' : ''} onchange="toggleCalendar('Birthdays', this.checked)" class="accent-checkbox" style="--c:#3b82f6"> Birthdays
                    </label>
                    <label class="check-item">
                        <input type="checkbox" ${selectedCalendars.has('Tasks') ? 'checked' : ''} onchange="toggleCalendar('Tasks', this.checked)" class="accent-checkbox" style="--c:#8b5cf6"> Tasks
                    </label>
                </div>
            </div>`;

            // Employee Calendar (Other users)
            let otherCalsHtml = '';
            ALL_USERS_LIST.forEach(emp => {
                const identifier = emp.name || emp.email;
                if (identifier && identifier !== currUserName) {
                    const uColor = USERS[identifier]?.color || '#0ea5e9';
                    otherCalsHtml += `
                    <label class="check-item">
                        <input type="checkbox" ${selectedCalendars.has(identifier) ? 'checked' : ''} onchange="toggleCalendar('${identifier.replace(/'/g, "\\'")}', this.checked)" class="accent-checkbox" style="--c:${uColor}"> ${identifier}
                    </label>`;
                }
            });

            const otherCals = !isTimetableAdmin() ? '' : `
            <div class="sidebar-section">
                <div class="sidebar-title" data-bs-toggle="collapse" data-bs-target="#otherCalendarsCollapse" aria-expanded="${isOtherCalsOpen ? 'true' : 'false'}" style="cursor:pointer;" onclick="isOtherCalsOpen=!isOtherCalsOpen">
                    <span>Employee Calendar</span>
                    <i class="bi bi-chevron-down text-muted"></i>
                </div>
                <div id="otherCalendarsCollapse" class="collapse ${isOtherCalsOpen ? 'show' : ''}">
                    ${otherCalsHtml || '<div class="text-muted small">No other users</div>'}
                </div>
            </div>`;

            // Mini Calendar
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let mMonthDate;
            if (currentView === 'day' || currentView === 'month') {
                mMonthDate = new Date(selectedDate);
            } else {
                mMonthDate = new Date(weekStart);
            }
            mMonthDate.setDate(1);
            mMonthDate.setMonth(mMonthDate.getMonth() + miniMonthOffset);

            const moStr = mMonthDate.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });

            const firstDay = new Date(mMonthDate.getFullYear(), mMonthDate.getMonth(), 1);
            let cur = addDays(firstDay, -firstDay.getDay()); // go back to Sunday

            let minidays = '<div class="mini-row head"><div class="mc">S</div><div class="mc">M</div><div class="mc">T</div><div class="mc">W</div><div class="mc">T</div><div class="mc">F</div><div class="mc">S</div></div>';

            for (let w = 0; w < 6; w++) {
                let r = '<div class="mini-row">';
                for (let d = 0; d < 7; d++) {
                    const isM = (cur.getMonth() === mMonthDate.getMonth());
                    const isT = (cur.getTime() === today.getTime());

                    // Selected week/day logic
                    let isSel = false;
                    if (currentView === 'week') {
                        isSel = cur >= weekStart && cur < addDays(weekStart, 7);
                    } else if (currentView === 'day' || currentView === 'month') {
                        isSel = cur.getTime() === selectedDate.getTime() || (currentView === 'month' && cur.getMonth() === selectedDate.getMonth() && cur.getFullYear() === selectedDate.getFullYear());
                    }

                    const c = `mc ${isM ? '' : 'off'} ${isT ? 't' : ''} ${isSel && !isT ? 's' : ''}`;
                    r += `<div class="${c}" onclick="selectDay('${dStr(cur)}')">${cur.getDate()}</div>`;

                    cur = addDays(cur, 1);
                }
                r += '</div>';
                minidays += r;
                if (cur.getMonth() !== mMonthDate.getMonth() && cur > firstDay) break; // stop if month changes and we're done
            }

            const miniCal = `
            <div class="sidebar-section mb-2 mt-0">
                <div class="d-flex align-items-center justify-content-between px-1 mb-1">
                    <span style="font-size:.8rem; font-weight:600; color:#3c4043;">${moStr}</span>
                    <div>
                        <i class="bi bi-chevron-left me-3 text-muted" style="cursor:pointer;font-size:.7rem;" onclick="navMini(-1)"></i>
                        <i class="bi bi-chevron-right text-muted" style="cursor:pointer;font-size:.7rem;" onclick="navMini(1)"></i>
                    </div>
                </div>
                <div class="mini-grid">
                    ${minidays}
                </div>
            </div>`;

            return `
            <div class="cal-sidebar">
                <button class="btn btn-primary shadow-sm rounded-pill px-4 py-2 d-flex align-items-center gap-2 mb-3 w-100 justify-content-center" 
                    style="font-weight:700; font-size: 0.9rem; transition:all .2s; background: linear-gradient(135deg,#1e3a8a,#2563eb); border: none; box-shadow: 0 4px 12px rgba(37,99,235,.3);" 
                    onclick="openCreateModal(dStr(new Date()), '', '')">
                    <i class="bi bi-plus-lg fs-5"></i>
                    <span>Schedule Activity</span>
                </button>
                ${miniCal}
                ${myCals}
                ${otherCals}
            </div>`;
        }

        // ── Helper: Pack overlapping events ────────────────────────
        function packEvents(eventsList) {
            eventsList.sort((a, b) => {
                const sA = a.sh * 60 + a.sm, eA = a.eh * 60 + a.em;
                const sB = b.sh * 60 + b.sm, eB = b.eh * 60 + b.em;

                // Priority sorting: HIGH > MEDIUM > LOW
                const pMap = { 'HIGH': 3, 'MEDIUM': 2, 'LOW': 1, 'NORMAL': 2 };
                const pA = pMap[(a.priority || '').toUpperCase()] || 0;
                const pB = pMap[(b.priority || '').toUpperCase()] || 0;

                // If priorities differ, high priority takes precedence for column placement (left-most)
                if (pA !== pB) return pB - pA;
                if (sA !== sB) return sA - sB;
                return eB - eA;
            });
            const placed = [];
            let columns = [];
            let lastEnd = null;
            function flush() {
                const numCols = columns.length;
                columns.forEach((col, c) => col.forEach(ev => placed.push({ ev, slot: c, slots: numCols })));
            }
            eventsList.forEach(ev => {
                const evS = ev.sh * 60 + ev.sm, evE = ev.eh * 60 + ev.em;
                if (lastEnd !== null && evS >= lastEnd) {
                    flush(); columns = []; lastEnd = null;
                }
                let placedInCol = false;
                for (let c = 0; c < columns.length; c++) {
                    const col = columns[c];
                    const lastEv = col[col.length - 1];
                    if (evS >= lastEv.eh * 60 + lastEv.em) {
                        col.push(ev); placedInCol = true; break;
                    }
                }
                if (!placedInCol) columns.push([ev]);
                if (lastEnd === null || evE > lastEnd) lastEnd = evE;
            });
            if (columns.length > 0) flush();
            return placed;
        }

        // ── Render calendar ─────────────────────────────────────
        async function renderCalendar() {
            let startD, endD;
            if (currentView === 'day') {
                startD = dStr(selectedDate);
                endD = dStr(selectedDate);
            } else if (currentView === 'month') {
                const centerDate = selectedDate || new Date();
                const mStart = new Date(centerDate.getFullYear(), centerDate.getMonth(), 1);
                startD = dStr(addDays(mStart, -mStart.getDay()));
                endD = dStr(addDays(mStart, 42)); // 6 weeks cover
            } else {
                startD = dStr(weekStart);
                endD = dStr(addDays(weekStart, 6)); // Week view
            }

            // Allow larger ranges for Tasks view
            if (showTaskView) {
                events = await fetchEvents(
                    dStr(addDays(new Date(), -30)),
                    dStr(addDays(new Date(), 30))
                );
            } else {
                events = await fetchEvents(startD, endD);
            }
            renderCalendarLocal();
        }

        function renderCalendarLocal() {

            // Always preserve accordion states before nuking the DOM
            const mcDOM = document.getElementById('myCalendarsCollapse');
            if (mcDOM) isMyCalsOpen = mcDOM.classList.contains('show');
            const ocDOM = document.getElementById('otherCalendarsCollapse');
            if (ocDOM) isOtherCalsOpen = ocDOM.classList.contains('show');

            const today = new Date();
            const todayStr = dStr(today);

            const filteredEvents = events.filter(ev => {
                const user = ev.user || ev.assignee_name;
                if (!user) return true;
                return selectedCalendars.has(user);
            });

            // ── TASK LIST VIEW ──────────────────────────────────────
            if (showTaskView) {
                // Group events by date, sort by time
                const currUserUnique = currentUser ? (currentUser.email || currentUser.name) : '';
                const grouped = {};
                filteredEvents.forEach(ev => {
                    const s = (ev.status || '').toUpperCase();
                    const isDone = (s === 'RESOLVED' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                    const isMyTask = (ev.user === currUserUnique || ev.assignee_name === currUserUnique);

                    if (taskFilter === 'pending' && isDone) return;
                    if (taskFilter === 'done' && !isDone) return;
                    if (taskFilter === 'my' && !isMyTask) return;
                    if (taskFilter === 'employees' && isMyTask) return;

                    if (!grouped[ev.date]) grouped[ev.date] = [];
                    grouped[ev.date].push(ev);
                });

                // Sort dates ascending
                const dates = Object.keys(grouped).sort();

                let html = '';
                if (dates.length === 0) {
                    html = `<div class="text-center text-muted mt-5" style="max-width:300px;margin:0 auto;">
                                <i class="bi bi-inbox fs-1 mb-2"></i>
                                <h6>No tasks found</h6>
                                <p class="small">There are no tasks matching this filter for the selected scope.</p>
                            </div>`;
                } else {
                    dates.forEach(d => {
                        const dateObj = new Date(d);
                        const dayName = dateObj.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long' });
                        const isTodayStr = (d === todayStr) ? ' <span class="badge bg-primary ms-2 rounded-pill px-2">Today</span>' : '';

                        // Sort events in day: Priority (HIGH > MEDIUM > LOW) then Time
                        const pMap = { 'HIGH': 3, 'MEDIUM': 2, 'LOW': 1, 'NORMAL': 2 };
                        grouped[d].sort((a, b) => {
                            const pa = pMap[(a.priority || '').toUpperCase()] || 0;
                            const pb = pMap[(b.priority || '').toUpperCase()] || 0;
                            if (pb !== pa) return pb - pa;
                            return (a.sh * 60 + a.sm) - (b.sh * 60 + b.sm);
                        });

                        const rows = grouped[d].map(ev => {
                            const u = getEventStyles(ev);
                            const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                            const s = (ev.status || '').toUpperCase();
                            const isDone = (s === 'RESOLVED' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                            return `
                            <div class="task-row ${isDone ? 'done-row' : ''}" style="border-left-color:${u.color};">
                                ${ev.event_type === 'TODO' ? `<div class="t-circle ${isDone ? 't-done' : ''}" style="color:${u.color};"
                                    onclick="completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></div>` : '<div style="width:24px; flex-shrink:0;"></div>'}
                                <div class="t-info">
                                    <div class="t-title">${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}</div>
                                    <div class="t-meta"><i class="bi bi-clock me-1"></i>${timeLbl} <span class="mx-2">•</span> <i class="bi bi-geo-alt me-1"></i>${ev.loc} <span class="mx-2">•</span> <i class="bi bi-person me-1"></i>${ev.user}</div>
                                </div>
                                <div class="t-actions">
                                    <button class="btn btn-sm btn-light border rounded-pill px-3" onclick="openEditModal('${ev._uid}')" style="font-size:.75rem;">Edit</button>
                                </div>
                            </div>`;
                        }).join('');

                        html += `
                        <div class="task-date-group">
                            <div class="task-date-lbl">${dayName}${isTodayStr}</div>
                            ${rows}
                        </div>`;
                    });
                }

                document.getElementById('main-content').innerHTML = `
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-3">
                        <button class="toggle-sb-btn ${isSidebarMinimized ? 'active' : ''}" onclick="toggleCalSidebar()" title="Toggle Sidebar">
                            <i class="bi bi-layout-sidebar-inset"></i>
                        </button>
                        <span class="nav-title fs-5">Tasks &amp; To-Do</span>
                    </div>
                    <div class="d-flex align-items-center gap-2 overflow-x-auto pb-1" style="max-width: 100%; -webkit-overflow-scrolling: touch;">
                        <div class="task-filter-pill mb-0 d-flex flex-nowrap" style="overflow-x: auto; -webkit-overflow-scrolling: touch;">
                            <button class="${taskFilter === 'all' ? 'active' : ''}" onclick="setTaskFilter('all')">All</button>
                            <button class="${taskFilter === 'pending' ? 'active' : ''}" onclick="setTaskFilter('pending')">Pending</button>
                            <button class="${taskFilter === 'done' ? 'active' : ''}" onclick="setTaskFilter('done')">Completed</button>
                            <button class="${taskFilter === 'my' ? 'active' : ''}" onclick="setTaskFilter('my')">My Tasks</button>
                            ${isTimetableAdmin() ? `<button class="${taskFilter === 'employees' ? 'active' : ''}" onclick="setTaskFilter('employees')">Employee Tasks</button>` : ''}
                        </div>
                        <button class="task-toggle-btn active" onclick="toggleTaskView()" title="Switch to Calendar">
                            <i class="bi bi-calendar3"></i>
                        </button>
                        <button class="btn btn-primary btn-sm px-3 d-flex align-items-center gap-1" onclick="openCreateModal(dStr(new Date()), '', '', 'TASK')">
                            <i class="bi bi-plus-lg"></i> <span class="d-none d-sm-inline">Add Task</span>
                        </button>
                    </div>
                </div>
                <div class="cal-wrapper">
                    <div class="cal-sidebar ${isSidebarMinimized ? 'minimized' : ''}">
                        ${buildSidebar().replace('<div class="cal-sidebar">', '').replace('</div>', '')}
                    </div>
                    <div class="cal-root task-view-wrap bg-light ${isSidebarMinimized ? 'expanded' : ''}">
                        <div style="max-width:800px;margin:0 auto;width:100%;">
                            ${html}
                        </div>
                    </div>
                </div>`;
                return;
            }

            // ── DAY VIEW ──────────────────────────────────────────
            if (currentView === 'day') {
                const sd = selectedDate;
                const sdStr = dStr(sd);
                const isToday = sdStr === todayStr;
                const dayName = DAY_NAMES[sd.getDay()];
                const dateNum = sd.getDate();
                const navTitle = sd.toLocaleDateString('en-IN', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });

                // Hour labels
                const hourLabels = Array.from({ length: END_HR - START_HR }, (_, i) => {
                    const h = START_HR + i;
                    const lbl = h === 12 ? '12 PM' : h < 12 ? `${h} AM` : `${h - 12} PM`;
                    return `<div class="cal-hour-lbl">${lbl}</div>`;
                }).join('');

                // Hour lines
                const TOTAL_H = (END_HR - START_HR) * HOUR_H;
                let lines = '';
                for (let r = 0; r < (END_HR - START_HR); r++) {
                    const h = START_HR + r;
                    const hStr = h.toString().padStart(2, '0');
                    lines += `<div class="cal-hline"      style="top:${r * HOUR_H}px; height:${HOUR_H / 2}px; cursor:pointer;" onclick="openCreateModal('${sdStr}', '${hStr}:00', '${hStr}:30')"></div>`;
                    lines += `<div class="cal-hline-half" style="top:${r * HOUR_H + HOUR_H / 2}px; height:${HOUR_H / 2}px; cursor:pointer;" onclick="openCreateModal('${sdStr}', '${hStr}:30', '${(h + 1).toString().padStart(2, '0')}:00')"></div>`;
                }

                // Events for this day
                const dayEvts = filteredEvents.filter(e => e.date === sdStr);
                const pinnedEvts = dayEvts.filter(e => (e.priority || '').toUpperCase() === 'HIGH');
                const scrollEvts = dayEvts.filter(e => (e.priority || '').toUpperCase() !== 'HIGH');

                const pinnedHtml = pinnedEvts.length > 0 ? `
                    <div class="tt-pinned-row-day">
                        <div style="font-size: 0.65rem; font-weight: 800; color: #b91c1c; margin-right: 8px; flex-shrink: 0; letter-spacing:.04em;">HIGH PRIORITY:</div>
                        ${pinnedEvts.map(ev => {
                    const u = getEventStyles(ev);
                    const timeStr = ev.event_type === 'MEETING' ? `[${String(ev.sh).padStart(2, '0')}:${String(ev.sm).padStart(2, '0')}] ` : '';
                    return `<div class="tt-pinned-capsule" style="background:${u.bg}; border-left:3px solid ${u.color}; color:${u.color}; width: auto; max-width: 200px;" onclick="openEditModal('${ev._uid}')" title="${timeStr}${ev.title}">
                                ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video-fill"></i>' : '<i class="bi bi-exclamation-circle-fill"></i>'} <span class="text-truncate">${timeStr}${ev.title}</span>
                            </div>`;
                }).join('')}
                    </div>` : '';

                const placed = packEvents(scrollEvts);
                const evHtml = placed.map(({ ev, slot, slots }) => {
                    const u = getEventStyles(ev);
                    const t = Math.max(topPx(ev.sh, ev.sm), 0);
                    const h = Math.max(hPx(ev.sh, ev.sm, ev.eh, ev.em), 22);
                    const wPct = 96 / slots;
                    const lPct = 2 + slot * wPct;
                    const rPct = 2 + (slots - slot - 1) * wPct;
                    const timeLbl = `${fmtH(ev.sh, ev.sm)} – ${fmtH(ev.eh, ev.em)}`;
                    const s = (ev.status || '').toUpperCase();
                    const isDone = (s === 'COMPLETED' || s === 'DONE' || s === 'CANCELLED' || s === 'CANCEL' || completedIds.has(ev._uid));
                    return `
                    <div class="cal-evt${isDone ? ' evt-done' : ''}" style="top:${t}px;height:${h}px;left:${lPct}%;right:${rPct}%;background:${u.bg};border-left:3px solid ${u.color};display:flex;flex-direction:column;padding-left:${ev.event_type === 'TODO' ? '17px' : '8px'};overflow:hidden;"
                         title="${ev.title} (${ev.user})\n${timeLbl}\n${ev.loc}"
                         onclick="event.stopPropagation();openEditModal('${ev._uid}')">
                        ${ev.event_type === 'TODO' ? `<button class="evt-complete-btn${isDone ? ' done' : ''}" style="color:${u.color};"
                            onclick="event.stopPropagation();completeEvent('${ev._uid}')" title="${isDone ? 'Mark incomplete' : 'Mark complete'}"></button>` : ''}
                        <div class="evt-inner-title" style="color:${u.color};font-size:.82rem;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;">
                            ${ev.event_type === 'MEETING' ? '<i class="bi bi-camera-video me-1"></i>' : ''}${ev.title}
                        </div>
                        ${h > 30 ? `<div class="evt-time" style="color:${u.color};font-size:0.7rem;">${timeLbl}</div>` : ''}
                        <div style="font-size:.72rem;color:${u.color};opacity:.7;margin-top:2px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;"><i class="bi bi-person me-1"></i>${ev.user}</div>
                    </div>`;
                }).join('');

                // Current time
                const nowH = today.getHours(), nowM = today.getMinutes();
                const nowTop = topPx(nowH, nowM);
                const showNow = isToday && nowH >= START_HR && nowH < END_HR;
                const nowHtml = showNow ? `<div class="now-dot" style="top:${nowTop}px;"></div><div class="now-line" style="top:${nowTop}px;"></div>` : '';

                document.getElementById('main-content').innerHTML = `
                <!-- Toolbar -->
                <div class="cal-toolbar">
                    <div class="d-flex align-items-center gap-2">
                        <button class="toggle-sb-btn ${isSidebarMinimized ? 'active' : ''}" onclick="toggleCalSidebar()" title="Toggle Sidebar">
                            <i class="bi bi-layout-sidebar-inset"></i>
                        </button>
                        <button class="nav-btn" onclick="navDay(-1)" title="Previous day"><i class="bi bi-chevron-left"></i></button>
                        <button class="nav-btn" onclick="navDay(1)"  title="Next day"><i class="bi bi-chevron-right"></i></button>
                        <button class="btn btn-sm btn-light border px-3" onclick="goToday()">Today</button>
                        <span class="nav-title text-truncate">${navTitle}</span>
                    </div>
                    <div class="d-flex align-items-center gap-3 flex-wrap">
                        <div class="view-pill">
                            <button class="active">Day</button>
                            <button onclick="setView('week')">Week</button>
                            <button onclick="setView('month')">Month</button>
                        </div>
                        <button class="task-toggle-btn ${showTaskView ? 'active' : ''}" onclick="toggleTaskView()">
                            <i class="bi bi-ui-checks"></i>
                            <span class="tt-tip">Switch to Tasks</span>
                        </button>
                    </div>
                </div>

                <div class="cal-wrapper">
                    <div class="cal-sidebar ${isSidebarMinimized ? 'minimized' : ''}">
                        ${buildSidebar().replace('<div class="cal-sidebar">', '').replace('</div>', '')}
                    </div>
                    <!-- Day calendar -->
                    <div class="cal-root">
                        <!-- Day header: single column -->
                        <div class="cal-day-header-row" style="grid-template-columns:60px 1fr;">
                            <div class="cal-gutter-head"></div>
                            <div class="cal-dh${isToday ? ' today' : ''}" style="flex:1;">
                                <div class="dn">${dayName}</div>
                                ${isToday ? `<div class="today-dot">${dateNum}</div>` : `<div class="dd">${dateNum}</div>`}
                            </div>
                        </div>
                        
                        <!-- Pinned Section -->
                        <div style="display: grid; grid-template-columns: 60px 1fr; border-bottom: 1px solid var(--border-subtle);">
                            <div class="cal-gutter-head" style="background: #f8fafc; border-right: 1px solid #e2e8f0;"></div>
                            ${pinnedHtml || '<div class="tt-pinned-row" style="background:#fff;"><span class="text-muted small" style="font-size:0.65rem; opacity:0.5;">No pinned items</span></div>'}
                        </div>

                        <!-- Scrollable body -->
                        <div class="cal-scroll" id="calScrollBody">
                            <div class="cal-body-inner">
                                <div class="cal-gutter">${hourLabels}</div>
                                <div style="flex:1;position:relative;height:${TOTAL_H}px;border-left:1px solid #f1f5f9;${isToday ? 'background:rgba(79,70,229,.03);' : ''}">
                                    ${lines}${evHtml}${nowHtml}
                                </div>
                            </div>
                        </div>
                    </div>
                </div>`;

                const sb = document.getElementById('calScrollBody');
                if (sb) sb.scrollTop = showNow ? Math.max(nowTop - 120, 0) : HOUR_H;
                return; // exit — week view not needed
            }

            // ── MONTH VIEW ─────────────────────────────────────────
            if (currentView === 'month') {
                const centerDate = selectedDate || new Date();
                const mStart = new Date(centerDate.getFullYear(), centerDate.getMonth(), 1);
                let cur = addDays(mStart, -mStart.getDay()); // Sunday

                const mo1 = mStart.toLocaleDateString('en-IN', { month: 'long', year: 'numeric' });
                const navTitle = mo1;

                const dayHeaders = DAY_NAMES.map(dn => `<div class="cal-dh"><div class="dn">${dn}</div></div>`).join('');

                let rowsHtml = '';
                for (let r = 0; r < 6; r++) {
