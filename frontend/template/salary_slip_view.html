<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Salary Slip | SRM AI SETU</title>
    <link rel="icon" type="image/x-icon" href="/frontend/favicon.ico">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/css/bootstrap.min.css">
    <link rel="stylesheet" href="/static/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/static/css/theme.css?v=20260406">
    <link rel="stylesheet" href="/static/css/components.css?v=20260406">
    <style>
        #loading {
            display: flex; justify-content: center; align-items: center;
            height: 70vh; font-size: 1rem; color: var(--text-muted); gap: 12px;
        }
        .spinner {
            width: 28px; height: 28px;
            border: 3px solid var(--border); border-top-color: var(--primary);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
        #error-box {
            display: none; text-align: center;
            padding: 80px 20px; color: #dc2626;
        }
    </style>
</head>
<body class="bg-app">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1 main-wrapper">
            <div class="page-content-standard">
                <div id="loading">
                    <div class="spinner"></div>
                    Loading salary slip&hellip;
                </div>
    <div id="error-box">
        <h3>Could not load salary slip</h3>
        <p id="error-msg"></p>
        <button id="retry-btn" onclick="location.reload()">Retry</button>
    </div>

            </div>
        </div>
    </div>
    <script src="/static/js/utils.js?v=20260403"></script>
    <script src="/static/js/auth.js?v=20260403"></script>
    <script src="/static/js/ui_components.js?v=20260403"></script>
    <script src="/static/js/app.js?v=20260403"></script>
    <script src="/static/js/api.js?v=20260403"></script>
    <script src="/static/js/bootstrap.bundle.min.js"></script>
    <script>
        requireAuth();
        injectTopHeader('Salary Slip');
        const sb = document.getElementById('sidebar');
        if (sb) sb.innerHTML = renderSidebar('salary');
        (async () => {
            const params = new URLSearchParams(window.location.search);
            const slipId = params.get('id');
            const loadingEl = document.getElementById('loading');
            const errorBox  = document.getElementById('error-box');

            function showError(msg) {
                if (loadingEl) loadingEl.style.display = 'none';
                if (errorBox) errorBox.style.display = 'block';
                const msgEl = document.getElementById('error-msg');
                if (msgEl) msgEl.textContent = msg || '';
            }

            if (window.__accessDenied) return;

            if (!slipId || slipId === 'undefined') { 
                showError('No valid salary slip ID provided in the URL. Please go back to the salary list and try again.'); 
                return; 
            }

            const token = sessionStorage.getItem('access_token');
            if (!token || token === 'null' || token === 'undefined' || token === '') {
                window.location.href = 'index.html';
                return;
            }

            // Allow api.js config fetch to resolve before reading API_BASE_URL
            await new Promise(r => setTimeout(r, 200));

            try {
                const base = (typeof ApiClient !== 'undefined' && ApiClient.API_BASE_URL)
                    ? ApiClient.API_BASE_URL
                    : (typeof API_BASE_URL !== 'undefined' ? API_BASE_URL : window.location.origin + '/api');

                const response = await fetch(
                    `${base}/hrm/salary/slip/${slipId}/invoice`,
                    { headers: { 'Authorization': `Bearer ${token}` } }
                );

                if (!response.ok) {
                    const txt = await response.text().catch(() => '');
                    let detail = `HTTP ${response.status}`;
                    try { detail += ': ' + (JSON.parse(txt).detail || txt); } catch { if (txt) detail += ': ' + txt; }
                    throw new Error(detail);
                }

                const html = await response.text();

                // Use page title from the slip HTML
                const titleMatch = html.match(/<title>(.*?)<\/title>/i);
                if (titleMatch) document.title = titleMatch[1];

                // Render inside a sandboxed iframe so the slip's own CSS/JS is isolated
                loadingEl.style.display = 'none';
                const frame = document.createElement('iframe');
                frame.style.cssText = 'display:block;width:100%;height:calc(100vh - 80px);border:none;border-radius:12px;box-shadow: 0 10px 25px rgba(0,0,0,0.05);';
                frame.srcdoc = html;
                document.querySelector('.page-content-standard').appendChild(frame);
            } catch (err) {
                showError(err.message || 'An unexpected error occurred.');
            }
        })();
    </script>
</body>
</html>
