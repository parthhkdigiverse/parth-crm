<!DOCTYPE html>
<!-- frontend/template/leaves.html -->
<html lang="en">

<head>
    <link rel="icon" type="image/x-icon" href="/frontend/favicon.ico">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Leaves — SRM AI SETU</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/frontend/css/bootstrap.min.css">
    <script>
        // CRITICAL: Global Error Handling (Placed in HEAD to catch early script failures)
        window.__loadedScripts = [];
        window.onerror = function(msg, url, lineNo, columnNo, error) {
            console.error('CRITICAL ERROR:', msg, url, lineNo, columnNo, error);
            const errorDivId = 'emergency-error-display';
            if (document.getElementById(errorDivId)) return false;

            const errorHtml = `
                <div id="${errorDivId}" style="position:fixed; top:20px; left:50%; transform:translateX(-50%); z-index:99999; width:90%; max-width:600px; background:#fee2e2; border:2px solid #ef4444; border-radius:12px; padding:20px; box-shadow:0 10px 15px -3px rgba(0,0,0,0.1); color:#991b1b; font-family:sans-serif;">
                    <h3 style="margin-top:0; font-size:1.25rem;">⚠️ Application Error</h3>
                    <p style="font-size:0.9rem;">A critical script error occurred while loading the page.</p>
                    <div style="background:#fef2f2; padding:10px; border-radius:6px; margin:10px 0; font-family:monospace; font-size:0.8rem; border:1px solid #fecaca; white-space:pre-wrap; word-break:break-all;">${msg}\nAt: ${url}\nLine: ${lineNo}</div>
                    <p style="font-size:0.8rem; margin-bottom:15px;">Scripts loaded: ${window.__loadedScripts.join(', ') || 'None'}</p>
                    <button onclick="location.reload()" style="background:#ef4444; color:white; border:none; padding:8px 16px; border-radius:6px; font-weight:600; cursor:pointer;">Reload Page</button>
                </div>
            `;
            
            // Force body visible
            if (document.body) {
                document.body.style.visibility = 'visible';
                document.body.style.opacity = '1';
                document.body.insertAdjacentHTML('afterbegin', errorHtml);
            } else {
                setTimeout(() => {
                    document.body.style.visibility = 'visible';
                    document.body.style.opacity = '1';
                    document.body.insertAdjacentHTML('afterbegin', errorHtml);
                }, 500);
            }
            return false;
        };
    </script>
    <link rel="stylesheet" href="/frontend/css/bootstrap-icons.min.css">
    <link rel="stylesheet" href="/frontend/css/theme.css?v=20260406">
    <link rel="stylesheet" href="/frontend/css/components.css?v=20260406">
</head>

<body class="bg-app">
    <div class="d-flex">
        <div id="sidebar"></div>
        <div class="flex-grow-1 main-wrapper">
            <div class="page-content-standard">
                <!-- Header -->
                <!-- Header Section -->
                <!-- Header Section -->
                <div class="page-header-glass mb-4 d-flex justify-content-between align-items-center flex-wrap gap-2">
                    <div class="mb-3 mb-sm-0">
                        <h2 class="page-section-title fw-bold mb-1">Leave Management</h2>
                        <p class="text-muted mb-0" style="font-size:0.93rem;">Apply for leaves and track approval status.</p>
                    </div>
                    <div class="d-flex align-items-center gap-3">
                        <button id="apply-leave-btn" class="btn btn-primary fw-semibold shadow-sm" style="border-radius:10px;" onclick="openLeaveModal()">
                            <i class="bi bi-calendar-plus me-2"></i>Apply Leave
                        </button>
                    </div>
                </div>

                <!-- Summary Cards (admin view) -->
                <div id="leave-summary-bar" class="row g-3 mb-2" style="display:none;">
                    <div class="col-6 col-md-3">
                        <div class="card stat-card card-warning h-100 p-3">
                            <div class="stat-label mb-2">Pending</div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="bg-warning-light text-warning rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:38px; height:38px;">
                                    <i class="bi bi-hourglass-split fs-5"></i>
                                </div>
                                <div class="stat-value" id="sum-pending">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card card-success h-100 p-3">
                            <div class="stat-label mb-2">Approved</div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="bg-success-light text-success rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:38px; height:38px;">
                                    <i class="bi bi-check-circle fs-5"></i>
                                </div>
                                <div class="stat-value" id="sum-approved">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card card-danger h-100 p-3">
                            <div class="stat-label mb-2">Rejected</div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="bg-danger-light text-danger rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:38px; height:38px;">
                                    <i class="bi bi-x-circle fs-5"></i>
                                </div>
                                <div class="stat-value" id="sum-rejected">0</div>
                            </div>
                        </div>
                    </div>
                    <div class="col-6 col-md-3">
                        <div class="card stat-card card-primary h-100 p-3">
                            <div class="stat-label mb-2">Total Days</div>
                            <div class="d-flex align-items-center gap-2">
                                <div class="bg-primary-soft text-primary rounded-3 d-flex align-items-center justify-content-center"
                                    style="width:38px; height:38px;">
                                    <i class="bi bi-calendar-check fs-5"></i>
                                </div>
                                <div class="stat-value" id="sum-total">0</div>
                            </div>
                        </div>
                    </div>
                </div>

                <div id="filter-wrapper" style="display:none;" class="mb-4"></div>

                <!-- My Attendance Table Removed -->

                <!-- Leaves Table -->
                <div class="grid-card">
                    <div class="d-flex justify-content-between align-items-center p-3 border-bottom">
                        <h6 class="fw-bold mb-0" style="color:var(--text-main);"><i
                                class="bi bi-list-check me-2 text-primary"></i>Leave Applications</h6>
                        <span id="leave-count-non-admin" class="text-muted small"></span>
                    </div>
                    <div class="table-responsive p-3">
                        <table class="table table-sm mb-0" style="font-size:0.8rem;">
                            <thead style="background:var(--bg-app); border-bottom: 1px solid var(--border);">
                                <tr>
                                    <th class="ps-4 text-uppercase small fw-bold text-muted" style="min-width: 150px;">Employee</th>
                                    <th class="text-uppercase small fw-bold text-muted" style="min-width: 100px;">Type</th>
                                    <th class="text-uppercase small fw-bold text-muted" style="min-width: 180px;">Period</th>
                                    <th class="text-uppercase small fw-bold text-muted" style="min-width: 80px;">Days</th>
                                    <th class="text-uppercase small fw-bold text-muted" style="min-width: 250px;">Reason & Remarks</th>
                                    <th class="text-uppercase small fw-bold text-muted" style="min-width: 150px;">Status</th>
                                    <th class="pe-4 text-end text-uppercase small fw-bold text-muted" style="min-width: 100px;">Actions</th>
                                </tr>
                            </thead>
                            <tbody id="leaves-tbody">
                                <tr>
                                    <td colspan="8" class="text-center py-5 text-muted">
                                        <span class="spinner-border spinner-border-sm me-2"></span>Loading...
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                    <div id="leaves-pagination"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Apply Leave Modal -->
    <div class="srm-overlay" id="leaveModal">
        <div class="srm-box" style="max-width:560px;">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                <h5 class="fw-bold mb-0"><i class="bi bi-calendar-minus text-primary me-2"></i>Apply for Leave</h5>
                <button class="btn-close" onclick="closeLeaveModal()"></button>
            </div>
            <div class="row g-3 mb-3">
                <div class="col-6">
                    <label class="form-label fw-semibold small">From Date <span class="text-danger">*</span></label>
                    <input type="date" id="l-start" class="form-control">
                </div>
                <div class="col-6">
                    <label class="form-label fw-semibold small">To Date <span class="text-danger">*</span></label>
                    <input type="date" id="l-end" class="form-control">
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small">Leave Type <span class="text-danger">*</span></label>
                    <select id="l-type" class="form-select">
                        <option value="ANNUAL">Annual Leave</option>
                        <option value="SICK">Sick Leave</option>
                        <option value="CASUAL" selected>Casual Leave</option>
                        <option value="UNPAID">Unpaid Leave</option>
                        <option value="OTHER">Other</option>
                    </select>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small">Day Type <span class="text-danger">*</span></label>
                    <div class="d-flex gap-2">
                            <span class="fw-semibold small" style="color:var(--primary);">Full Day</span>
                        </label>
                        <label class="d-flex align-items-center gap-2 cursor-pointer px-3 py-2 rounded border"
                            id="dt-half-lbl" style="flex:1; cursor:pointer; border-color:var(--border);">
                            <input type="radio" name="day-type" id="dt-half" value="HALF" class="form-check-input m-0">
                            <span class="fw-semibold small">Half Day</span>
                        </label>
                    </div>
                </div>
                <div class="col-12">
                    <label class="form-label fw-semibold small">Reason <span class="text-danger">*</span></label>
                    <textarea id="l-reason" class="form-control" rows="3"
                        placeholder="Please describe your reason for leave..." required></textarea>
                    <div class="form-text text-muted" style="font-size:0.78rem;">Reason is mandatory. Provide a clear
                        justification.</div>
                </div>
            </div>

            <!-- Day count preview -->
            <div id="leave-day-preview" class="mb-3 p-2 rounded border small text-center fw-semibold"
                style="display:none; background:var(--primary-soft); color:var(--primary);"></div>

            <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                <button class="btn btn-light border" onclick="closeLeaveModal()">Cancel</button>
                <button class="btn btn-primary px-4 fw-semibold" id="leave-submit-btn" onclick="submitLeave()">Submit
                    Request</button>
            </div>
        </div>
    </div>

    <!-- Remarks Modal (Admin: Approve/Reject with remarks) -->
    <div class="srm-overlay" id="remarksModal">
        <div class="srm-box" style="max-width:440px;">
            <div class="d-flex justify-content-between align-items-center mb-4 pb-3 border-bottom">
                <h5 class="fw-bold mb-0" id="remarks-modal-title"><i
                        class="bi bi-chat-left-text text-primary me-2"></i>Action</h5>
                <button class="btn-close" onclick="closeRemarksModal()"></button>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold small">Remarks <span
                        class="text-muted fw-normal">(optional)</span></label>
                <textarea id="remarks-input" class="form-control" rows="3"
                    placeholder="Enter remarks for the employee..."></textarea>
                <div class="form-text text-muted" id="remarks-helper" style="font-size:0.78rem;"></div>
            </div>
            <div class="d-flex justify-content-end gap-2 pt-3 border-top">
                <button class="btn btn-light border" onclick="closeRemarksModal()">Cancel</button>
                <button class="btn btn-danger px-4 fw-semibold" id="remarks-submit-btn"
                    onclick="submitRemarksApproval()">Submit</button>
            </div>
        </div>
    </div>

    <script src="/frontend/js/utils.js?v=20260403" onload="window.__loadedScripts.push('utils.js')"></script>
    <script src="/frontend/js/api.js?v=20260403" onload="window.__loadedScripts.push('api.js')"></script>
    <script src="/frontend/js/auth.js?v=20260403" onload="window.__loadedScripts.push('auth.js')"></script>
    <script src="/frontend/js/ui_components.js?v=20260403" onload="window.__loadedScripts.push('ui_components.js')"></script>
    <script src="/frontend/js/app.js?v=20260403" onload="window.__loadedScripts.push('app.js')"></script>
    <script src="/frontend/js/bootstrap.bundle.min.js" onload="window.__loadedScripts.push('bootstrap.js')"></script>
    <script>
        if (typeof window.requireAuth === 'function') window.requireAuth();
        const sb = document.getElementById('sidebar');
        if (sb) sb.innerHTML = renderSidebar('leaves');
        injectTopHeader('Leaves');

        const user = window.getUser ? window.getUser() : null;
        const isAdmin = user?.role === 'ADMIN';
        const canApplyLeave = !isAdmin && (window.hasFeatureAccess ? window.hasFeatureAccess('leave_apply_roles') : true);
        const canEditOwnLeave = window.hasFeatureAccess ? window.hasFeatureAccess('leave_edit_own_roles') : !isAdmin;
        const canManageLeave = window.hasFeatureAccess ? window.hasFeatureAccess('leave_manage_roles') : isAdmin;
        let leaveEditMode = false;
        let editingLeaveId = null;
        let currentLeaveRows = [];

        const applyBtn = document.getElementById('apply-leave-btn');
        if (applyBtn && !canApplyLeave) {
            applyBtn.style.display = 'none';
        }

        let currentFilters = {};

        function initFilters(employees) {
            renderFilterPanel({
                containerId: 'filter-wrapper',
                filters: [
                    { type: 'select', label: 'Employee', id: 'filter-user', options: [{ value: 'ALL', label: 'All Employees' }, ...employees.map(e => ({ value: e.id, label: e.name || e.email }))] },
                    { type: 'select', label: 'Status', id: 'filter-status', options: [
                        { value: 'ALL', label: 'All Statuses' },
                        { value: 'PENDING', label: 'Pending' },
                        { value: 'APPROVED', label: 'Approved' },
                        { value: 'REJECTED', label: 'Rejected' }
                    ]},
                    { type: 'select', label: 'Leave Type', id: 'filter-type', options: [
                        { value: 'ALL', label: 'All Types' },
                        { value: 'ANNUAL', label: 'Annual' },
                        { value: 'SICK', label: 'Sick' },
                        { value: 'CASUAL', label: 'Casual' },
                        { value: 'UNPAID', label: 'Unpaid' },
                        { value: 'OTHER', label: 'Other' }
                    ]},
                    { type: 'date', label: 'From Date', id: 'filter-from' },
                    { type: 'date', label: 'To Date', id: 'filter-to' }
                ],
                onApply: (data) => {
                    currentFilters = data;
                    loadLeaves();
                },
                onReset: () => {
                    currentFilters = {};
                    loadLeaves();
                }
            });
        }

        if (canManageLeave) {
            document.getElementById('leave-summary-bar').style.display = 'flex';
            document.getElementById('filter-wrapper').style.display = 'block';
            ApiClient.getEmployees().then(emps => {
                initFilters(emps);
            }).catch(() => { });
        }

        // Modal controls
        function openLeaveModal() {
            leaveEditMode = false;
            editingLeaveId = null;
            document.getElementById('leaveModal').classList.add('show');
            document.getElementById('leave-day-preview').style.display = 'none';
            document.getElementById('l-start').value = '';
            document.getElementById('l-end').value = '';
            document.getElementById('l-reason').value = '';
            document.getElementById('l-type').value = 'CASUAL';
            document.getElementById('leave-submit-btn').textContent = 'Submit Request';
            document.getElementById('dt-full').checked = true;
            document.getElementById('dt-full-lbl').style.borderColor = 'var(--primary)';
            document.getElementById('dt-half-lbl').style.borderColor = 'var(--border)';
            document.getElementById('dt-half-lbl').style.background = 'transparent';

            // Clear validation state
            const modalBody = document.querySelector('#leaveModal .srm-box');
            if (modalBody) {
                modalBody.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                modalBody.querySelectorAll('.invalid-feedback').forEach(el => el.remove());
            }
        }

        function openEditLeave(leaveId) {
            const leave = (currentLeaveRows || []).find(l => l.id === leaveId);
            if (!leave) return;
            if (!canEditOwnLeave) return;
            leaveEditMode = true;
            editingLeaveId = leave.id;
            document.getElementById('leaveModal').classList.add('show');
            document.getElementById('l-start').value = leave.start_date;
            document.getElementById('l-end').value = leave.end_date;
            document.getElementById('l-reason').value = leave.reason || '';
            document.getElementById('l-type').value = leave.leave_type || 'CASUAL';
            if ((leave.day_type || 'FULL') === 'HALF') {
                document.getElementById('dt-half').checked = true;
                document.getElementById('dt-half-lbl').style.borderColor = 'var(--primary)';
                document.getElementById('dt-half-lbl').style.background = 'var(--primary-soft)';
                document.getElementById('dt-full-lbl').style.borderColor = 'var(--border)';
                document.getElementById('dt-full-lbl').style.background = 'transparent';
            } else {
                document.getElementById('dt-full').checked = true;
                document.getElementById('dt-full-lbl').style.borderColor = 'var(--primary)';
                document.getElementById('dt-full-lbl').style.background = 'var(--primary-soft)';
                document.getElementById('dt-half-lbl').style.borderColor = 'var(--border)';
                document.getElementById('dt-half-lbl').style.background = 'transparent';
            }
            document.getElementById('leave-submit-btn').textContent = 'Update Request';
            updateDayPreview();

            // Clear validation state
            const modalBody = document.querySelector('#leaveModal .srm-box');
            if (modalBody) {
                modalBody.querySelectorAll('.is-invalid').forEach(el => el.classList.remove('is-invalid'));
                modalBody.querySelectorAll('.invalid-feedback').forEach(el => el.remove());
            }
        }

        async function cancelLeave(leaveId) {
            if (!canEditOwnLeave) {
                showToast('You do not have permission to cancel leave', 'error');
                return;
            }
            if (!confirm('Cancel this leave request?')) return;
            try {
                await ApiClient.deleteLeave(leaveId);
                showToast('Leave request cancelled.', 'success');
                loadLeaves();
            } catch (e) {
                showToast(e.data?.detail || e.message || 'Failed to cancel leave', 'error');
            }
        }
        function closeLeaveModal() { document.getElementById('leaveModal').classList.remove('show'); }
        document.getElementById('leaveModal').addEventListener('click', function (e) { if (e.target === this) this.classList.remove('show'); });
        document.getElementById('remarksModal').addEventListener('click', function (e) { if (e.target === this) closeRemarksModal(); });

        // Day count preview
        function updateDayPreview() {
            const s = document.getElementById('l-start').value;
            const e = document.getElementById('l-end').value;
            const isHalf = document.getElementById('dt-half').checked;
            const el = document.getElementById('leave-day-preview');
            if (s && e && new Date(e) >= new Date(s)) {
                const calDays = Math.ceil((new Date(e) - new Date(s)) / 86400000) + 1;
                const days = isHalf ? calDays * 0.5 : calDays;
                el.textContent = days + ' day' + (days !== 1 ? 's' : '') + ' of leave' + (isHalf ? ' (half day)' : '');
                el.style.display = 'block';
            } else {
                el.style.display = 'none';
            }
        }
        document.getElementById('l-start').addEventListener('change', updateDayPreview);
        document.getElementById('l-end').addEventListener('change', updateDayPreview);
        document.querySelectorAll('input[name="day-type"]').forEach(r => r.addEventListener('change', function () {
            updateDayPreview();
            // Update visual highlight
            document.getElementById('dt-full-lbl').style.borderColor = '';
            document.getElementById('dt-full-lbl').style.background = '';
            document.getElementById('dt-half-lbl').style.borderColor = '';
            document.getElementById('dt-half-lbl').style.background = '';
            const active = this.id === 'dt-full' ? 'dt-full-lbl' : 'dt-half-lbl';
            document.getElementById(active).style.borderColor = 'var(--primary)';
            document.getElementById(active).style.background = 'var(--primary-soft)';
            const inactive = this.id === 'dt-full' ? 'dt-half-lbl' : 'dt-full-lbl';
            document.getElementById(inactive).style.borderColor = 'var(--border)';
            document.getElementById(inactive).style.background = 'transparent';
        }));

        // Leave status styling
        const leaveStatusMap = {
            PENDING: { cls: 'badge-yellow-light', label: 'Pending', icon: 'bi-hourglass-split' },
            APPROVED: { cls: 'badge-green-light', label: 'Approved', icon: 'bi-check-circle' },
            REJECTED: { cls: 'badge-red-light', label: 'Rejected', icon: 'bi-x-circle' },
        };

        const leaveTypeLabels = {
            ANNUAL: 'Annual',
            SICK: 'Sick',
            CASUAL: 'Casual',
            UNPAID: 'Unpaid',
            OTHER: 'Other',
        };



        // Load leaves
        async function loadLeaves() {
            const tbody = document.getElementById('leaves-tbody');
            try {
                let allLeaves = null;
                let leaves;
                if (canManageLeave) {
                    allLeaves = await ApiClient.getAllLeaves();
                    leaves = [...allLeaves];
                } else {
                    leaves = await ApiClient.getMyLeaves();
                }
                currentLeaveRows = leaves;

                // Apply filters (admin only)
                if (canManageLeave) {
                    const userF = currentFilters['filter-user'];
                    const statusF = currentFilters['filter-status'];
                    const typeF = currentFilters['filter-type'];
                    const fromF = currentFilters['filter-from'];
                    const toF = currentFilters['filter-to'];

                    if (userF && userF !== 'ALL') leaves = leaves.filter(l => String(l.user_id) === String(userF));
                    if (statusF && statusF !== 'ALL') leaves = leaves.filter(l => l.status === statusF);
                    if (typeF && typeF !== 'ALL') leaves = leaves.filter(l => (l.leave_type || 'CASUAL') === typeF);
                    if (fromF) leaves = leaves.filter(l => (l.start_date || "").slice(0, 10) >= fromF);
                    if (toF) leaves = leaves.filter(l => (l.end_date || "").slice(0, 10) <= toF);
                }

                // Summary counts (admin) — uses unfiltered allLeaves saved before filter was applied
                if (canManageLeave) {
                    let pending = 0, approved = 0, rejected = 0, totalDays = 0;
                    allLeaves.forEach(l => {
                        const d = Math.ceil((new Date(l.end_date) - new Date(l.start_date)) / 86400000) + 1;
                        totalDays += d;
                        if (l.status === 'PENDING') pending++;
                        else if (l.status === 'APPROVED') approved++;
                        else rejected++;
                    });
                    document.getElementById('sum-pending').textContent = pending;
                    document.getElementById('sum-approved').textContent = approved;
                    document.getElementById('sum-rejected').textContent = rejected;
                    document.getElementById('sum-total').textContent = totalDays;
                }

                const countStr = leaves.length + ' record(s)';
                const countNonAdmin = document.getElementById('leave-count-non-admin');
                if (countNonAdmin) countNonAdmin.textContent = canManageLeave ? '' : countStr;

                renderPagination({
                    data: leaves,
                    tbodyId: 'leaves-tbody',
                    paginationId: 'leaves-pagination',
                    emptyMsg: '<tr><td colspan="8" class="text-center py-5 text-muted">No leave requests found.</td></tr>',
                    renderRow: (l) => {
                        try {
                            if (!l) return "";
                            const st = leaveStatusMap[l.status] || leaveStatusMap.PENDING;
                            const startStr = l.start_date || "";
                            const endStr = l.end_date || "";

                            const start = startStr ? new Date(startStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
                            const end = endStr ? new Date(endStr).toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' }) : 'N/A';
                            
                            let displayDays = 0;
                            let dayTypeLabel = '';
                            if (startStr && endStr) {
                                const days = Math.ceil((new Date(endStr) - new Date(startStr)) / 86400000) + 1;
                                const dayHalf = (l.day_type === 'HALF') ? 0.5 : 1;
                                displayDays = days * dayHalf;
                                if (l.day_type === 'HALF') {
                                    dayTypeLabel = '<span class="badge bg-warning-subtle text-warning border ms-1" style="font-size:0.7rem;">Half</span>';
                                }
                            }
                            
                            const typeLabel = leaveTypeLabels[l.leave_type] || l.leave_type || 'Casual';
                            const typeCls = l.leave_type === 'UNPAID' ? 'bg-danger-subtle text-danger border' : 'bg-surface text-main border';

                            let lastCol;
                            const isAutoLeave = (l.reason || '').includes('Auto leave');
                            
                            if (canManageLeave && l.status === 'PENDING') {
                                lastCol = `<div class="d-flex gap-1 flex-wrap">
                                   <button class="btn btn-sm btn-outline-success" title="Approve" onclick="approveLeaveWithRemarks('${l.id}', 'APPROVED')"><i class="bi bi-check-lg"></i> Approve</button>
                                   <button class="btn btn-sm btn-outline-danger" title="Reject" onclick="approveLeaveWithRemarks('${l.id}', 'REJECTED')"><i class="bi bi-x-lg"></i> Reject</button>
                                 </div>`;
                            } else if (!canManageLeave && canEditOwnLeave && l.status === 'PENDING' && String(l.user_id) === String(user?.id)) {
                                if (isAutoLeave) {
                                    lastCol = `<span class="text-muted small italic"><i class="bi bi-lock-fill me-1"></i>Auto leave restricted</span>`;
                                } else {
                                    lastCol = `<div class="d-flex gap-1 flex-wrap">
                                        <button class="btn btn-sm btn-outline-primary" title="Edit" onclick="openEditLeave('${l.id}')"><i class="bi bi-pencil"></i> Edit</button>
                                        <button class="btn btn-sm btn-outline-danger" title="Cancel" onclick="cancelLeave('${l.id}')"><i class="bi bi-x-circle"></i> Cancel</button>
                                    </div>`;
                                }
                            } else if (canManageLeave && (l.status === 'APPROVED' || l.status === 'REJECTED')) {
                                lastCol = `<div class="d-flex gap-1 justify-content-end">
                                    <button class="btn btn-sm btn-outline-secondary" style="font-size:0.7rem;" title="Edit Remarks" onclick="approveLeaveWithRemarks('${l.id}', '${l.status}')">
                                        <i class="bi bi-chat-left-text me-1"></i>Remark
                                    </button>
                                </div>`;
                            } else if (l.remarks) {
                                const remarksEsc = (l.remarks || '').replace(/"/g, '&quot;').replace(/</g, '&lt;');
                                lastCol = `<span class="text-muted small d-block text-truncate" style="max-width:160px;" title="${remarksEsc}"><i class="bi bi-chat-left-text me-1"></i>${remarksEsc}</span>`;
                            } else if (l.approver_name) {
                                lastCol = `<span class="text-muted small">By: ${l.approver_name}</span>`;
                            } else {
                                lastCol = '<span class="text-muted small">--</span>';
                            }

                            const createdStr = l.created_at ? new Date(l.created_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                            const updatedStr = l.updated_at ? new Date(l.updated_at).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' }) : '';
                            const timeInfo = l.status === 'PENDING'
                                ? `<div class="text-muted" style="font-size:0.65rem; margin-top:2px;">Applied: ${createdStr}</div>`
                                : `<div class="text-muted" style="font-size:0.65rem; margin-top:2px;">Decided: ${updatedStr}</div>`;

                            const reasonHtml = l.reason ? `<div class="mb-1"><strong>Reason:</strong> <span class="text-muted">${l.reason}</span></div>` : '';
                            const remarksTheme = l.status === 'REJECTED' ? 'background:var(--danger-soft); border:1px solid var(--danger-ring); color:var(--danger-text);' : 'background:var(--bg-app); color:var(--text-main);';
                            const remarksHtml = l.remarks ? `<div class="p-2 rounded mt-1" style="${remarksTheme} font-size:0.75rem;"><strong>Admin Remark:</strong> ${l.remarks}</div>` : '';

                            return `<tr>
                                <td class="ps-4 fw-semibold text-dark" style="white-space:nowrap; max-width:150px; overflow:hidden; text-overflow:ellipsis;" title="${l.user_name || ''}">${l.user_name || 'User #' + String(l.user_id).slice(-4)}</td>
                                <td><span class="badge ${typeCls}" style="font-weight:500;white-space:nowrap; font-size:0.75rem;">${typeLabel}</span></td>
                                <td class="text-muted" style="white-space:nowrap; font-size:0.75rem;">${start} — ${end}</td>
                                <td class="fw-semibold" style="white-space:nowrap; font-size:0.75rem;">${displayDays}${dayTypeLabel}</td>
                                <td>
                                    <div style="font-size:0.75rem; line-height:1.3; min-width:200px;">
                                        ${reasonHtml}
                                        ${remarksHtml}
                                    </div>
                                </td>
                                <td>
                                    <span class="status-pill ${st.cls}" style="white-space:nowrap; font-size:0.7rem;"><i class="bi ${st.icon} me-1"></i>${st.label}</span>
                                    ${timeInfo}
                                </td>
                                <td class="pe-4 text-end">
                                    ${lastCol}
                                </td>
                            </tr>`;
                        } catch (err) {
                            console.error("Error rendering leave row:", err, l);
                            return `<tr><td colspan="8" class="text-center py-2 bg-light text-danger small">Error rendering record ${l?.id || 'unknown'}</td></tr>`;
                        }
                    }
                });
            } catch (e) {
                tbody.innerHTML = `<tr><td colspan="8" class="text-center py-5 text-danger"><i class="bi bi-exclamation-triangle me-2"></i>${e.message || 'Error'}</td></tr>`;
            }
        }

        // Submit leave
        async function submitLeave() {
            const start = document.getElementById('l-start').value;
            const end = document.getElementById('l-end').value;
            const reason = document.getElementById('l-reason').value.trim();
            const leaveType = document.getElementById('l-type').value;
            const btn = document.getElementById('leave-submit-btn');

            const rules = {
                'l-start': 'Start date is required',
                'l-end': () => {
                    if (!end) return 'End date is required';
                    if (new Date(end) < new Date(start)) return 'End date must be after start date';
                    return true;
                },
                'l-reason': 'Reason is mandatory'
            };

            if (!window.validateForm(document.querySelector('#leaveModal .srm-box'), rules)) {
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>' + (leaveEditMode ? 'Updating...' : 'Submitting...');
            try {
                const payload = {
                    start_date: start,
                    end_date: end,
                    leave_type: leaveType,
                    day_type: document.querySelector('input[name="day-type"]:checked').value,
                    reason: reason,
                };
                if (leaveEditMode && editingLeaveId) {
                    await ApiClient.updateLeave(editingLeaveId, payload);
                } else {
                    await ApiClient.applyLeave(payload);
                }
                closeLeaveModal();
                showToast(leaveEditMode ? 'Leave request updated successfully.' : 'Leave request submitted successfully.', 'success');
                loadLeaves();
            } catch (e) { showToast(e.data?.detail || e.message || 'Failed to apply leave', 'error'); }
            finally { btn.disabled = false; btn.textContent = leaveEditMode ? 'Update Request' : 'Submit Request'; }
        }

        // Approve / Reject — with optional remarks modal
        let _pendingApprovalId = null;
        let _pendingApprovalStatus = null;

        function approveLeaveWithRemarks(id, status) {
            _pendingApprovalId = id;
            _pendingApprovalStatus = status;
            const modal = document.getElementById('remarksModal');
            const title = document.getElementById('remarks-modal-title');
            const remarksInput = document.getElementById('remarks-input');
            const submitBtn = document.getElementById('remarks-submit-btn');
            remarksInput.value = '';
            if (status === 'REJECTED') {
                title.innerHTML = '<i class="bi bi-x-circle text-danger me-2"></i>Reject Leave';
                submitBtn.className = 'btn btn-danger px-4 fw-semibold';
                submitBtn.textContent = 'Reject';
                document.getElementById('remarks-helper').textContent = 'Provide a reason for rejection (recommended).';
            } else {
                title.innerHTML = '<i class="bi bi-check-circle text-success me-2"></i>Approve Leave';
                submitBtn.className = 'btn btn-success px-4 fw-semibold';
                submitBtn.textContent = 'Approve';
                document.getElementById('remarks-helper').textContent = 'Optional: Add a note for the employee.';
            }
            modal.classList.add('show');
            remarksInput.focus();
        }

        function closeRemarksModal() {
            document.getElementById('remarksModal').classList.remove('show');
            _pendingApprovalId = null;
            _pendingApprovalStatus = null;
        }

        async function submitRemarksApproval() {
            if (!_pendingApprovalId || !_pendingApprovalStatus) return;
            const remarks = document.getElementById('remarks-input').value.trim();
            const btn = document.getElementById('remarks-submit-btn');
            btn.disabled = true;
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';
            try {
                await ApiClient.approveRejectLeave(_pendingApprovalId, _pendingApprovalStatus, remarks || null);
                const label = _pendingApprovalStatus === 'APPROVED' ? 'approved' : 'rejected';
                showToast('Leave ' + label + ' successfully.', 'success');
                closeRemarksModal();
                loadLeaves();
            } catch (e) { showToast(e.data?.detail || e.message || 'Action failed', 'error'); }
            finally { btn.disabled = false; btn.textContent = _pendingApprovalStatus === 'APPROVED' ? 'Approve' : 'Reject'; }
        }

        // Legacy approveLeave (kept for safety)
        async function approveLeave(id, status) {
            approveLeaveWithRemarks(id, status);
        }

        const end = new Date();
        const start = new Date();
        start.setDate(end.getDate() - 6);

        if (!canManageLeave) {
            loadLeaves();
        } else {
            const reconStart = new Date();
            reconStart.setDate(end.getDate() - 30);
            ApiClient.getAttendanceSummary({
                start_date: reconStart.toISOString().slice(0, 10),
                end_date: end.toISOString().slice(0, 10),
                reconcile: true
            }).finally(loadLeaves);
        }
        // end script
    </script>
    <script>
        console.log('Final inline script running');
        // Final fallback to ensure visibility
        setTimeout(() => {
            console.log('Final visibility check (instant)');
            document.body.style.visibility = 'visible';
            document.body.style.opacity = '1';
            const mw = document.querySelector('.main-wrapper');
            if (mw) {
                mw.style.visibility = 'visible';
                mw.style.display = 'block';
                mw.style.opacity = '1';
            }
            console.log('Body visibility forced to visible');
        }, 0);
    </script>
</body>

</html>
